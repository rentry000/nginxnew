name: Build Latest Nginx Static Binary + All Modules (including geoip2 & perl dynamic) for Android arm64-v8a (NDK r29)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 🌱 准备环境 + NDK r29 + standalone toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential wget unzip tree patch perl git libgd-dev libxslt1-dev

          wget -q https://dl.google.com/android/repository/android-ndk-r29-linux.zip -O ndk.zip
          unzip -q ndk.zip -d /opt
          echo "ANDROID_NDK_ROOT=/opt/android-ndk-r29" >> $GITHUB_ENV

          # 🔥 关键：生成 standalone toolchain（官方推荐方式）
          python3 $ANDROID_NDK_ROOT/build/tools/make_standalone_toolchain.py \
            --arch arm64 --api 28 --install-dir /tmp/android-toolchain
          echo "✅ Standalone toolchain 已生成"

      - name: 📦 下载并验证所有源码
        run: |
          rm -rf nginx-* zlib-* pcre2-* openssl-* libmaxminddb* ngx_http_geoip2_module* || true

          wget https://nginx.org/download/nginx-1.28.2.tar.gz
          tar -xzf nginx-1.28.2.tar.gz

          wget https://zlib.net/zlib-1.3.2.tar.gz
          tar -xzf zlib-1.3.2.tar.gz

          wget https://github.com/PCRE2Project/pcre2/releases/download/pcre2-10.44/pcre2-10.44.tar.gz
          tar -xzf pcre2-10.44.tar.gz

          wget https://www.openssl.org/source/openssl-3.3.2.tar.gz
          tar -xzf openssl-3.3.2.tar.gz

          git clone https://github.com/maxmind/libmaxminddb.git
          cd libmaxminddb && git fetch --tags && git checkout 1.13.2 && cd ..

          git clone https://github.com/leev/ngx_http_geoip2_module.git

      - name: 🩹 stubs 注入 + 权限修复
        run: |
          cd nginx-1.28.2
          chmod +x configure
          mkdir -p auto/types

          cat > auto/types/sizeof << 'EOF'
          #!/bin/sh
          case "$1" in
            int|unsigned\ int) echo " 4 bytes" ;;
            long|unsigned\ long) echo " 8 bytes" ;;
            size_t|off_t|time_t|"void *") echo " 8 bytes" ;;
            "long long"|"unsigned long long") echo " 8 bytes" ;;
            *) echo " 8 bytes" ;;
          esac
          EOF
          chmod +x auto/types/sizeof

          echo " 8 bytes" > auto/types/uintptr
          echo " 8 bytes" > auto/types/uintptr_t
          echo " 8 bytes" > auto/types/pointer
          echo " 4 bytes" > auto/types/int
          echo " 8 bytes" > auto/types/long
          echo " 8 bytes" > auto/types/size_t
          echo " little endian" > auto/endianness

      - name: 🔨 Configure Nginx - 所有模块
        run: |
          cd nginx-1.28.2

          TOOLCHAIN=/tmp/android-toolchain
          export PATH=$TOOLCHAIN/bin:$PATH

          export CC=$TOOLCHAIN/bin/aarch64-linux-android-clang
          export AR=$TOOLCHAIN/bin/llvm-ar
          export RANLIB=$TOOLCHAIN/bin/llvm-ranlib
          export LD=$TOOLCHAIN/bin/ld.lld

          export CFLAGS="-Os -fPIC -fPIE -DNGX_HAVE_SCHED_SETAFFINITY=0"
          export LDFLAGS="-static -pie -Wl,--gc-sections -Wl,--strip-all -fuse-ld=lld"

          echo "CC 测试："
          $CC --version

          ./configure \
            --prefix=/data/local/tmp/nginx \
            --with-cc="$CC" \
            --with-cc-opt="$CFLAGS" \
            --with-ld-opt="$LDFLAGS" \
            --with-zlib=../zlib-1.3.2 \
            --with-pcre=../pcre2-10.44 \
            --with-openssl=../openssl-3.3.2 \
            --with-http_ssl_module \
            --with-http_v2_module \
            --with-http_v3_module \
            --with-http_gzip_static_module \
            --with-http_stub_status_module \
            --with-http_realip_module \
            --with-http_addition_module \
            --with-http_sub_module \
            --with-http_dav_module \
            --with-http_flv_module \
            --with-http_mp4_module \
            --with-http_gunzip_module \
            --with-http_auth_request_module \
            --with-http_random_index_module \
            --with-http_secure_link_module \
            --with-http_slice_module \
            --with-mail \
            --with-mail_ssl_module \
            --with-stream \
            --with-stream_ssl_module \
            --with-stream_realip_module \
            --with-threads \
            --with-file-aio \
            --with-poll_module \
            --with-http_geoip_module=dynamic \
            --with-http_image_filter_module=dynamic \
            --with-http_xslt_module=dynamic \
            --with-http_perl_module=dynamic \
            --with-stream_geoip_module=dynamic \
            --add-dynamic-module=../ngx_http_geoip2_module \
            2>&1 | tee ../configure.log || (echo "❌ Configure 失败！真实错误："; tail -n 100 objs/config.log 2>/dev/null || tail -n 100 ../configure.log; exit 1)

          ls -l Makefile objs/nginx objs/*.so 2>/dev/null || echo "关键文件缺失"

      - name: 🔨 Make + 提取产物
        run: |
          cd nginx-1.28.2
          make -j$(nproc) || exit 1
          mkdir -p ../build/install/arm64-v8a/{sbin,modules,conf}
          cp objs/nginx ../build/install/arm64-v8a/sbin/nginx
          cp objs/*.so ../build/install/arm64-v8a/modules/ 2>/dev/null || true
          cp -r conf/* ../build/install/arm64-v8a/conf/ || true
          file ../build/install/arm64-v8a/sbin/nginx
          ls -lh ../build/install/arm64-v8a/modules/ ../build/install/arm64-v8a/sbin/nginx

      - name: 📤 上传产物
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nginx-arm64-all-modules-full
          path: |
            build/install/arm64-v8a/
            configure.log
            make.log
            nginx-1.28.2/objs/config.log

      - name: 📋 诊断
        if: always()
        run: |
          echo "=== configure.log 最后 100 行 ==="
          tail -n 100 configure.log 2>/dev/null || echo "无日志"
          echo "=== objs/config.log 最后 100 行 ==="
          tail -n 100 nginx-1.28.2/objs/config.log 2>/dev/null || echo "无 config.log"
