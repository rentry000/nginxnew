name: Build Original Nginx for Android arm64-v8a (NDK r29)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 🌱 克隆原仓库并检查结构
        run: |
          git clone https://github.com/ryanlee486/nginx-android.git
          cd nginx-android
          tree -L 2  # 打印目录结构辅助分析
          find . -name "*.sh" -type f -exec chmod +x {} \;
          echo "✅ 原仓库克隆及权限修复完成"

      - name: 📦 安装依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libssl-dev zlib1g-dev patch wget unzip tree
          echo "✅ 依赖安装完成"

      - name: 📦 配置 Android NDK r29
        run: |
          wget -q https://dl.google.com/android/repository/android-ndk-r29-linux.zip -O ndk.zip
          unzip -q ndk.zip -d /opt
          export ANDROID_NDK_ROOT=/opt/android-ndk-r29
          echo "ANDROID_NDK_ROOT=$ANDROID_NDK_ROOT" >> $GITHUB_ENV
          echo "✅ NDK r29 配置完成"

      - name: 🛠️ 修复问题补丁（终极方案）
        run: |
          cd nginx-android
          # 找到问题补丁并修复
          PATCH_FILE="src/nginx_patches/01-cross-compilation-sizeof.patch"
          if [ -f "$PATCH_FILE" ]; then
            echo "🔍 修复补丁文件: $PATCH_FILE"
            # 移除补丁中的无效字符（示例修复）
            sed -i '/^[^+-@ ]/d' "$PATCH_FILE"  # 移除非法行首字符
            sed -i 's/^[[:space:]]*$//' "$PATCH_FILE"  # 移除空行
            echo "✅ 补丁修复完成"
          else
            echo "❌ 未找到问题补丁，构建可能失败"
            exit 1
          fi

      - name: 🛠️ 调整构建脚本路径
        run: |
          cd nginx-android
          if [ -f "scripts/build-android.sh" ]; then
            # 修正补丁目录路径（根据实际结构调整）
            sed -i 's|patches/|src/nginx_patches/|' scripts/build-android.sh
            echo "✅ 构建脚本路径修复完成"
          else
            echo "❌ 未找到构建脚本，构建无法继续"
            exit 1
          fi

      - name: 🧐 调试补丁状态
        run: |
          cd nginx-android
          echo "=== 当前补丁文件 ==="
          find . -name "*.patch"
          echo "=== 构建脚本补丁路径 ==="
          grep "patches/" scripts/build-android.sh

      - name: 🔨 构建 Nginx for arm64-v8a
        run: |
          cd nginx-android
          export ANDROID_ABI=arm64-v8a
          export ANDROID_NDK_ROOT=$ANDROID_NDK_ROOT
          ./scripts/build-android.sh
          echo "✅ 构建完成"

      - name: 📤 上传构建产物
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: nginx-android-arm64-v8a
          path: nginx-android/build/install/arm64-v8a/
