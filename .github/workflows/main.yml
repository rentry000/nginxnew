name: Build Latest Nginx Static Binary for Android arm64-v8a (NDK r29 - Fixed)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 🌱 准备环境 + NDK r29
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential wget unzip tree patch perl
          wget -q https://dl.google.com/android/repository/android-ndk-r29-linux.zip -O ndk.zip
          unzip -q ndk.zip -d /opt
          echo "ANDROID_NDK_ROOT=/opt/android-ndk-r29" >> $GITHUB_ENV

      - name: 📦 下载 Nginx + 依赖源码（最新版）
        run: |
          # Nginx 1.28.2
          wget https://nginx.org/download/nginx-1.28.2.tar.gz
          tar -xzf nginx-1.28.2.tar.gz

          # Zlib 1.3.2
          wget https://zlib.net/zlib-1.3.2.tar.gz
          tar -xzf zlib-1.3.2.tar.gz

          # PCRE2 10.44 (稳定)
          wget https://github.com/PCRE2Project/pcre2/releases/download/pcre2-10.44/pcre2-10.44.tar.gz
          tar -xzf pcre2-10.44.tar.gz

          # OpenSSL 3.3.2 (稳定)
          wget https://www.openssl.org/source/openssl-3.3.2.tar.gz
          tar -xzf openssl-3.3.2.tar.gz

      - name: 🩹 注入 stubs（sizeof 等检测绕过）
        run: |
          cd nginx-1.28.2
          cat > auto/types/sizeof << 'EOF'
          #!/bin/sh
          case "$1" in
            int|unsigned\ int) echo " 4 bytes" ;;
            long|unsigned\ long|size_t|off_t|time_t|"void *") echo " 8 bytes" ;;
            "long long"|"unsigned long long") echo " 8 bytes" ;;
            *) echo " 8 bytes" ;;
          esac
          EOF
          chmod +x auto/types/sizeof

          echo " 8 bytes" > auto/types/uintptr
          echo " little endian" > auto/endianness

          echo "✅ Stubs injected"

      - name: 🔨 Configure Nginx (交叉编译 + 静态)
        run: |
          cd nginx-1.28.2

          TOOLCHAIN=/opt/android-ndk-r29/toolchains/llvm/prebuilt/linux-x86_64
          export PATH=$TOOLCHAIN/bin:$PATH

          export CC="aarch64-linux-android28-clang --sysroot=$TOOLCHAIN/sysroot"
          export CXX="aarch64-linux-android28-clang++ --sysroot=$TOOLCHAIN/sysroot"
          export AR="llvm-ar"
          export RANLIB="llvm-ranlib"
          export LD="ld.lld"
          export STRIP="llvm-strip"

          export CFLAGS="-Os -fPIC -fPIE"
          export LDFLAGS="-static -pie -Wl,--gc-sections -Wl,--strip-all -fuse-ld=lld"

          ./auto/configure \
            --prefix=/data/local/tmp/nginx \
            --with-cc="$CC" \
            --with-cc-opt="$CFLAGS" \
            --with-ld-opt="$LDFLAGS" \
            --with-zlib=../zlib-1.3.2 \
            --with-pcre=../pcre2-10.44 \
            --with-openssl=../openssl-3.3.2 \
            --with-http_ssl_module \
            --with-http_v2_module \
            --with-http_v3_module \
            --with-stream \
            --with-stream_ssl_module \
            --with-threads \
            --with-file-aio \
            --with-poll_module \
            --without-http_rewrite_module \
            2>&1 | tee ../configure.log || (echo "Configure failed! Key errors:"; tail -n 50 ../configure.log; exit 1)

          ls -l Makefile objs || echo "Makefile/objs missing - configure failed"

      - name: 🔨 Make + 提取二进制
        run: |
          cd nginx-1.28.2
          make -j$(nproc) || (echo "Make failed!"; tail -n 50 ../configure.log; exit 1)
          mkdir -p ../build/install/arm64-v8a/sbin ../build/install/arm64-v8a/conf
          cp objs/nginx ../build/install/arm64-v8a/sbin/nginx || echo "nginx binary missing"
          cp -r conf/* ../build/install/arm64-v8a/conf/ || true
          file ../build/install/arm64-v8a/sbin/nginx

      - name: 📤 上传产物 + 日志
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nginx-arm64-static
          path: |
            build/install/arm64-v8a/
            configure.log

      - name: 📋 失败诊断
        if: failure()
        run: |
          echo "Last 60 lines of configure.log:"
          tail -n 60 configure.log
