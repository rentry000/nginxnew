name: Build Static PHP 8.5.2 (GitHub Mirror 稳定版)

on:
  workflow_dispatch:
    inputs:
      php_version:
        description: 'PHP Version'
        required: true
        default: '8.5.2'
  push:
    branches: [ main ]
    paths:
      - 'craft.yml'

jobs:
  build:
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download prebuilt spc binary
        run: |
          curl -fsSL -o spc https://dl.static-php.dev/static-php-cli/spc-bin/nightly/spc-linux-aarch64
          chmod +x spc
          ./spc --version

      - name: Install build prerequisites
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            binutils bison flex libtool autoconf automake make patch pkg-config git \
            libxml2-dev libsqlite3-dev zlib1g-dev libcurl4-openssl-dev libssl-dev \
            libbz2-dev libjpeg-dev libpng-dev libfreetype6-dev libonig-dev libzip-dev \
            libreadline-dev libgmp-dev libicu-dev libsodium-dev libbrotli-dev re2c autopoint gettext

      - name: Create craft.yml (官方示例配置)
        run: |
          cat > craft.yml << 'EOF'
          php-version: "8.5.2.tar.gz"

          extensions: "apcu,bcmath,calendar,ctype,curl,dba,dom,exif,fileinfo,filter,gd,iconv,mbregex,mbstring,mysqli,mysqlnd,opcache,openssl,pcntl,pdo,pdo_mysql,pdo_sqlite,phar,posix,readline,redis,session,simplexml,sockets,sodium,sqlite3,tokenizer,xml,xmlreader,xmlwriter,xsl,zip,zlib"

          sapi:
            - cli
            - micro
            - fpm

          download-options:
            prefer-pre-built: true
          EOF

      - name: Check environment
        run: |
          ./spc doctor || true

      - name: Safe clean caches
        run: |
          rm -rf downloads buildroot || true

      - name: 下载 PHP 源码（GitHub Mirror - 最稳定）
        run: |
          mkdir -p source/php-src downloads
          echo "从 GitHub 下载 PHP 8.5.2 源码（约 25MB）..."
          curl -L -f --retry 5 -o downloads/php-8.5.2.tar.gz \
            https://github.com/php/php-src/archive/refs/tags/php-8.5.2.tar.gz
          
          echo "下载完成，文件大小："
          ls -lh downloads/php-8.5.2.tar.gz
          
          echo "解压源码..."
          tar -xzf downloads/php-8.5.2.tar.gz -C source/php-src --strip-components=1
          echo "PHP 源码解压成功！"
          ls -lh source/php-src | head -n 6

      - name: Download 其他依赖库（php-src 已存在，跳过查询）
        run: |
          ./spc download all --with-php=8.5.2.tar.gz --ignore-cache-sources=php-src --debug

      - name: Build static PHP
        run: |
          ./spc craft --debug

      - name: Prepare artifacts
        run: |
          mkdir -p artifacts
          cp dist/* artifacts/ 2>/dev/null || true
          ls -lh artifacts/

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: static-php-8.5.2-linux-aarch64
          path: artifacts/
          retention-days: 7
