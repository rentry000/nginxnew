name: Build Nginx for Android arm64-v8a

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Clone nginx-android repository
        run: git clone https://github.com/ryanlee486/nginx-android.git

      - name: Download Android NDK r29
        run: |
          wget -q https://dl.google.com/android/repository/android-ndk-r29-linux.zip -O ndk.zip
          unzip -q ndk.zip -d /opt
          echo "ANDROID_NDK_ROOT=/opt/android-ndk-r29" >> $GITHUB_ENV

      - name: Remove problematic patch file (Force Skip)
        run: |
          # 直接删除导致失败的补丁文件
          rm -f nginx-android/patches/nginx-1.25.3/01-cross-compilation-sizeof.patch
          
          # 额外保险：如果脚本里硬编码了这个补丁，也尝试注释掉脚本里的调用
          # 这里使用 sed 强制注释掉包含该文件名的行
          sed -i 's/.*01-cross-compilation-sizeof\.patch.*/echo "Skipping problematic patch"/' nginx-android/scripts/build-android.sh

      - name: Build Nginx for arm64-v8a
        run: |
          cd nginx-android
          # 注意：原代码中的 ANDROID_ARCHS=x86_64 是错误的，这里修正
          ./scripts/build-android.sh --arch arm64-v8a

      - name: Package binary
        run: |
          mkdir -p artifacts
          # 检查构建目录是否存在，防止拷贝失败
          if [ -f "nginx-android/build/nginx-arm64-v8a/nginx" ]; then
            cp nginx-android/build/nginx-arm64-v8a/nginx artifacts/nginx-arm64
            cd artifacts
            zip -r ../nginx-arm64-magisk.zip .
          else
            echo "Error: Nginx binary not found. Build failed."
            exit 1
          fi

      - name: Upload Release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: Nginx Android arm64-v8a Binary
          files: nginx-arm64-magisk.zip
          draft: false
