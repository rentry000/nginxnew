name: Build Nginx for Android arm64-v8a

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Clone nginx-android repository
        run: git clone https://github.com/ryanlee486/nginx-android.git

      - name: Download Android NDK r27
        run: |
          wget -q https://dl.google.com/android/repository/android-ndk-r29-linux.zip -O ndk.zip
          unzip -q ndk.zip -d /opt
          echo "ANDROID_NDK_ROOT=/opt/android-ndk-r29" >> $GITHUB_ENV

      - name: 🔒 三重保险：彻底禁用问题补丁
        run: |
          cd nginx-android
          
          # 保险1️⃣：物理删除（主路径）
          find patches -name "01-cross-compilation-sizeof.patch" -delete 2>/dev/null || true
          
          # 保险2️⃣：清空内容（防脚本提前缓存路径）
          find patches -name "*.patch" -type f -exec sh -c '
            if grep -q "cross-compilation-sizeof" "$1" 2>/dev/null; then
              echo "// Patch intentionally neutered to avoid NDK r27 incompatibility" > "$1"
              echo "✅ Neutralized: $1"
            fi
          ' _ {} \;
          
          # 保险3️⃣：修改构建脚本 - 跳过含关键词的补丁
          sed -i '/for patch_file in .*\.patch;/,/^done$/ {
            /patch -p1/ {
              i\
              # SKIP problematic patch for NDK r27\
              if [[ "$(basename \"$patch_file\")" == *"cross-compilation-sizeof"* ]]; then\
                echo "⏭️  Skipping incompatible patch: $(basename \"$patch_file\")";\
                continue;\
              fi
            }
          }' scripts/build-android.sh || echo "⚠️ Sed injection skipped (non-critical)"

      - name: 🛠️ 验证补丁状态（关键调试）
        run: |
          echo "🔍 检查补丁目录状态:"
          find nginx-android/patches -name "*.patch" -type f | while read f; do
            echo "📄 $f"
            head -3 "$f"
          done
          echo -e "\n🔍 检查构建脚本是否注入跳过逻辑:"
          grep -A 3 "SKIP problematic patch" nginx-android/scripts/build-android.sh || echo "未找到注入点（可能结构不同，但前两重保险已生效）"

      - name: 🚀 Build Nginx for arm64-v8a
        run: |
          cd nginx-android
          ./scripts/build-android.sh --arch arm64-v8a

      - name: 📦 Package binary
        run: |
          mkdir -p artifacts
          BINARY="nginx-android/build/nginx-arm64-v8a/nginx"
          if [ -f "$BINARY" ]; then
            cp "$BINARY" artifacts/nginx-arm64
            file artifacts/nginx-arm64  # 验证是否为ARM64二进制
            cd artifacts && zip -r ../nginx-arm64-magisk.zip .
          else
            echo "❌ 构建失败：未找到二进制文件"
            ls -lh nginx-android/build/ 2>/dev/null || echo "构建目录不存在"
            exit 1
          fi

      - name: 📤 Upload Release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: Nginx Android arm64-v8a (NDK r27 Fixed)
          files: nginx-arm64-magisk.zip
          draft: false
