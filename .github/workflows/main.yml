name: Build Original Nginx for Android arm64-v8a (NDK r29 Final)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 🌱 克隆原仓库
        run: |
          git clone https://github.com/ryanlee486/nginx-android.git
          cd nginx-android
          # 修复脚本权限
          find . -name "*.sh" -type f -exec chmod +x {} \;
          echo "✅ 仓库克隆完成"

      - name: 📦 安装依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libssl-dev zlib1g-dev patch wget unzip tree
          echo "✅ 依赖安装完成"

      - name: 📦 配置 Android NDK r29
        run: |
          wget -q https://dl.google.com/android/repository/android-ndk-r29-linux.zip -O ndk.zip
          unzip -q ndk.zip -d /opt
          export ANDROID_NDK_ROOT=/opt/android-ndk-r29
          echo "ANDROID_NDK_ROOT=$ANDROID_NDK_ROOT" >> $GITHUB_ENV
          echo "✅ NDK r29 配置完成"

      - name: 🔍 调试：检查构建脚本内容 (关键)
        run: |
          cd nginx-android
          echo "=== 构建脚本头部信息 ==="
          head -n 20 scripts/build-android.sh
          echo "=== 搜索 patch 关键词 ==="
          grep -n "patch" scripts/build-android.sh | head -5

      - name: 🛠️ 强制移除冲突补丁 (核心修复)
        run: |
          cd nginx-android
          # NDK r29 (Clang 21) 不需要这个补丁，且会导致构建失败
          CONFLICT_PATCH="src/nginx_patches/01-cross-compilation-sizeof.patch"
          if [ -f "$CONFLICT_PATCH" ]; then
            echo "🗑️ 检测到冲突补丁，正在移除: $CONFLICT_PATCH"
            rm -f "$CONFLICT_PATCH"
            echo "✅ 冲突补丁已移除"
          else
            echo "✅ 补丁文件不存在，无需处理"
          fi

      - name: 🧐 调试：验证补丁目录状态
        run: |
          cd nginx-android
          echo "=== 当前存在的补丁文件 ==="
          find src/nginx_patches -type f -name "*.patch" | sort

      - name: 🔨 构建 Nginx for arm64-v8a
        run: |
          cd nginx-android
          export ANDROID_ABI=arm64-v8a
          export ANDROID_NDK_ROOT=$ANDROID_NDK_ROOT
          # 开启 bash 调试模式，遇到错误立即停止并打印行号
          set -ex
          ./scripts/build-android.sh
          # set +x (注释掉，让上面的生效)

      - name: 📤 上传构建产物
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: nginx-android-arm64-v8a
          path: nginx-android/build/install/arm64-v8a/
