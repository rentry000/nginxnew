name: Build Nginx 1.29.5 for Android arm64-v8a (NDK r29)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 🌱 检查环境
        run: |
          echo "Runner OS: $(lsb_release -d | cut -f2)"
          echo "GCC Version: $(gcc --version | head -n1)"
          echo "Clang Version: $(clang --version | head -n1)"

      - name: 🌱 克隆基础仓库
        run: |
          git clone https://github.com/ryanlee486/nginx-android.git
          cd nginx-android
          find . -name "*.sh" -type f -exec chmod +x {} \;
          echo "✅ 基础仓库克隆及权限修复完成"

      - name: 📦 安装依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libssl-dev zlib1g-dev patch wget unzip tree
          echo "✅ 依赖安装完成"

      - name: 📦 下载并配置 Android NDK r29
        run: |
          wget -q https://dl.google.com/android/repository/android-ndk-r29-linux.zip -O ndk.zip
          unzip -q ndk.zip -d /opt
          export ANDROID_NDK_ROOT=/opt/android-ndk-r29
          echo "ANDROID_NDK_ROOT=$ANDROID_NDK_ROOT" >> $GITHUB_ENV
          echo "✅ NDK r29 配置完成"

      - name: 📥 替换为 Nginx 1.29.5（修复路径）
        run: |
          # 查找原仓库中的 Nginx 源码目录（假设在 nginx-android/src/nginx）
          NGINX_SRC_DIR="nginx-android/src/nginx"
          if [ -d "$NGINX_SRC_DIR" ]; then
            echo "检测到 Nginx 源码目录: $NGINX_SRC_DIR"
            rm -rf "$NGINX_SRC_DIR"/*
          else
            echo "❌ 未找到默认源码目录，尝试创建"
            mkdir -p "$NGINX_SRC_DIR"
          fi
          
          wget -q https://github.com/nginx/nginx/releases/download/release-1.29.5/nginx-1.29.5.zip -O nginx.zip
          unzip -q nginx.zip
          mv nginx-1.29.5/* "$NGINX_SRC_DIR/"
          rm -rf nginx-1.29.5 nginx.zip
          echo "✅ 已替换为 Nginx 1.29.5"

      - name: 🛠️ 彻底清除所有补丁（关键修复）
        run: |
          cd nginx-android
          # 删除所有 .patch 文件（包括子目录）
          find . -name "*.patch" -exec rm -f {} \;
          echo "✅ 已删除所有补丁文件"

      - name: 🛠️ 禁用构建脚本的补丁逻辑
        run: |
          cd nginx-android
          if [ -f "scripts/build-android.sh" ]; then
            # 注释掉补丁应用代码块
            sed -i '/for patch in patches\/\*.patch/,/done/ s/^/#/' scripts/build-android.sh
            echo "✅ 已禁用补丁应用逻辑"
          fi

      - name: 🧐 调试补丁路径（验证修复）
        run: |
          cd nginx-android
          echo "=== 当前目录下的补丁文件 ==="
          find . -name "*.patch"
          echo "=== 构建脚本中与补丁相关的代码 ==="
          grep -A 10 "patch" scripts/build-android.sh

      - name: 🔨 构建 Nginx 1.29.5 for arm64-v8a
        run: |
          cd nginx-android
          export ANDROID_ABI=arm64-v8a
          export ANDROID_NDK_ROOT=$ANDROID_NDK_ROOT
          ./scripts/build-android.sh
          echo "✅ 构建完成"

      - name: 📤 上传构建产物
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: nginx-1.29.5-android-arm64-v8a
          path: nginx-android/build/install/arm64-v8a/
