name: Build Latest Nginx Static Binary for Android arm64-v8a (NDK r29 - Debug Fixed)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 🌱 准备环境 + NDK r29
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential wget unzip tree patch perl
          wget -q https://dl.google.com/android/repository/android-ndk-r29-linux.zip -O ndk.zip
          unzip -q ndk.zip -d /opt
          echo "ANDROID_NDK_ROOT=/opt/android-ndk-r29" >> $GITHUB_ENV

      - name: 📦 下载并验证源码
        run: |
          wget https://nginx.org/download/nginx-1.28.2.tar.gz || echo "wget nginx failed!"
          tar -xzf nginx-1.28.2.tar.gz || echo "tar failed!"
          ls -la nginx-1.28.2/  # 必须看到 auto/ conf/ src/ 等
          ls -la nginx-1.28.2/auto/ | grep configure  # 确认 auto/configure 存在

      - name: 🩹 注入 stubs + 权限修复
        run: |
          cd nginx-1.28.2 || exit 1
          if [ ! -f auto/configure ]; then
            echo "FATAL: auto/configure not found!"
            ls -la auto/
            exit 1
          fi
          chmod +x auto/configure
          echo "auto/configure permissions:" && ls -l auto/configure

          # stubs
          cat > auto/types/sizeof << 'EOF'
          #!/bin/sh
          case "$1" in
            int|unsigned\ int) echo " 4 bytes" ;;
            long|unsigned\ long|size_t|off_t|time_t|"void *") echo " 8 bytes" ;;
            "long long"|"unsigned long long") echo " 8 bytes" ;;
            *) echo " 8 bytes" ;;
          esac
          EOF
          chmod +x auto/types/sizeof
          echo " 8 bytes" > auto/types/uintptr
          echo " little endian" > auto/endianness

      - name: 🔨 Configure (简化版 + 诊断)
        run: |
          cd nginx-1.28.2

          TOOLCHAIN=/opt/android-ndk-r29/toolchains/llvm/prebuilt/linux-x86_64
          export PATH=$TOOLCHAIN/bin:$PATH

          export CC="aarch64-linux-android28-clang --sysroot=$TOOLCHAIN/sysroot"
          export AR="llvm-ar"
          export RANLIB="llvm-ranlib"
          export LD="ld.lld"

          export CFLAGS="-Os -fPIC"
          export LDFLAGS="-static -Wl,--gc-sections"

          echo "Trying configure..."
          ./auto/configure \
            --prefix=/tmp/nginx \
            --with-cc="$CC" \
            --with-cc-opt="$CFLAGS" \
            --with-ld-opt="$LDFLAGS" \
            --with-zlib=../zlib-1.3.2 \
            --with-pcre=../pcre2-10.44 \
            --with-openssl=../openssl-3.3.2 \
            --with-http_ssl_module \
            --with-stream \
            --with-threads \
            || (echo "Configure FAILED! Dumping logs:"; cat objs/config.log 2>/dev/null || echo "No config.log"; tail -n 100 config.log 2>/dev/null; exit 1)

          echo "Configure done, checking Makefile:"
          ls -l Makefile objs/ || echo "Makefile/objs missing"

      - name: 🔨 Make
        run: |
          cd nginx-1.28.2
          make -j$(nproc) || exit 1
          mkdir -p ../build/install/arm64-v8a/sbin
          cp objs/nginx ../build/install/arm64-v8a/sbin/ || echo "No nginx binary"
          file ../build/install/arm64-v8a/sbin/nginx

      - name: 📤 Upload
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nginx-debug
          path: |
            nginx-1.28.2/objs/config.log
            build/install/arm64-v8a/

      - name: 📋 Summary
        if: always()
        run: |
          echo "Key files:"
          ls -l nginx-1.28.2/Makefile nginx-1.28.2/objs/nginx 2>/dev/null || true
          echo "Last configure attempt log:"
          tail -n 60 nginx-1.28.2/objs/config.log 2>/dev/null || echo "No log"
