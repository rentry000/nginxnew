name: Build Nginx for Android arm64-v8a (NDK r29 - sizeof 最终根治版 v4)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 🌱 克隆仓库
        run: |
          git clone https://github.com/ryanlee486/nginx-android.git
          cd nginx-android
          find . -name "*.sh" -type f -exec chmod +x {} \;
          echo "✅ 仓库准备完成"

      - name: 📦 安装依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libssl-dev zlib1g-dev patch wget unzip tree
          echo "✅ 依赖安装完成"

      - name: 📦 配置 NDK r29
        run: |
          wget -q https://dl.google.com/android/repository/android-ndk-r29-linux.zip -O ndk.zip
          unzip -q ndk.zip -d /opt
          echo "ANDROID_NDK_ROOT=/opt/android-ndk-r29" >> $GITHUB_ENV
          echo "✅ NDK 配置完成"

      - name: 🛠️ 清理坏补丁 + 规范化
        run: |
          cd nginx-android
          PATCH_DIR="src/nginx_patches"
          
          # 删除已知坏补丁（01 和 08）
          rm -f "$PATCH_DIR"/01-cross-compilation-sizeof.patch "$PATCH_DIR"/08-android-cpu-affinity.patch 2>/dev/null || true
          find "$PATCH_DIR" -iname "*sizeof*" -o -iname "*cpu-affinity*" -type f -exec mv {} {}.bak 2>/dev/null \; || true
          
          # 规范化所有剩余 patch（防止 malformed）
          find "$PATCH_DIR" -name "*.patch" -type f -exec sh -c '
            tr -d "\r" < "$1" > "$1.tmp" && mv "$1.tmp" "$1"
            [ -n "$(tail -c1 "$1")" ] && echo >> "$1"
          ' _ {} \;
          echo "✅ 坏补丁清理完成 + 剩余 patch 已规范化"

      - name: 🩹 精准根治 sizeof（修改 build-nginx.sh）
        run: |
          cd nginx-android
          
          echo "🔧 在 build-nginx.sh 中注入 sizeof 硬编码 stub（在 configure 前强制执行）..."
          
          # 在 ./auto/configure 调用前插入 stub（最精准位置，绕过 rollback 和 git clean）
          sed -i '/^\s*.\\/auto\\/configure \\/i \
          echo -e "\( {YELLOW}🛠️ Injecting hardcoded sizeof stub for arm64-v8a (LP64)... \){NC}"; \
          mkdir -p auto/types; \
          cat > auto/types/sizeof << '"'"'STUB_EOF'"'"' \
          #!/bin/sh \
          ngx_type="$1" \
          case "$ngx_type" in \
            int|unsigned\\ int)                 echo " 4 bytes" ;; \
            long|unsigned\\ long|size_t|off_t|time_t|"void *") echo " 8 bytes" ;; \
            "long long"|"unsigned long long")  echo " 8 bytes" ;; \
            *)                                 echo " 8 bytes" ;; \
          esac \
          echo "✅ sizeof stub applied (arm64-v8a LP64)" \
          STUB_EOF \
          chmod +x auto/types/sizeof' scripts/build-nginx.sh
          
          echo "✅ sizeof stub 已成功注入到 build-nginx.sh（configure 前执行）"

      - name: 🧪 验证注入效果
        run: |
          cd nginx-android
          echo "=== build-nginx.sh 注入验证 ==="
          grep -A 20 "Injecting hardcoded sizeof stub" scripts/build-nginx.sh || echo "⚠️ 未找到注入代码"
          echo -e "\n=== 剩余补丁（不应有 01/08）==="
          ls -1 src/nginx_patches/ 2>/dev/null | grep -E '01|08' || echo "✅ 01 和 08 已彻底移除"

      - name: 🔨 构建（开启详细日志）
        run: |
          cd nginx-android
          export ANDROID_ABI=arm64-v8a
          export ANDROID_NDK_ROOT=/opt/android-ndk-r29
          export CFLAGS="${CFLAGS} -DNGX_HAVE_SCHED_SETAFFINITY=0 -DNGX_HAVE_GNU_CRYPT_R=1"
          set -exo pipefail
          ./scripts/build-android.sh 2>&1 | tee build.log
          echo "✅ 构建完成（日志已保存）"

      - name: 📤 上传产物与日志
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nginx-build-artifacts
          path: |
            nginx-android/build/install/arm64-v8a/
            nginx-android/build.log

      - name: 📋 构建摘要（失败时显示关键错误）
        if: failure()
        run: |
          echo "❌ 构建失败！最后 50 行关键日志："
          tail -n 50 nginx-android/build.log | grep -A 30 -E "error|failed|sizeof|Exec|detect|int size|bytes|Injecting" || tail -n 40 nginx-android/build.log
