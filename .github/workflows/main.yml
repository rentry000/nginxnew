name: Build Static PHP 8.5 (aarch64) with Maximum Extensions

on:
  workflow_dispatch:
    inputs:
      php_version:
        description: 'PHP Version (8.1 \~ 8.5)'
        required: true
        default: '8.5'
      build_target:
        description: 'Build target (linux-x86_64, linux-aarch64, macos-x86_64, macos-aarch64)'
        required: true
        default: 'linux-aarch64'
  push:
    branches: [ main ]
    paths:
      - 'craft.yml'

jobs:
  build:
    runs-on: ubuntu-latest  # 支持 linux-aarch64 构建（ubuntu-latest 是 x86_64，但 spc 可以 cross-compile）

    steps:
      - name: Checkout your repository
        uses: actions/checkout@v4

      # ... 其他不变

        - name: Download prebuilt spc binary (nightly)
          run: |
            TARGET="${{ github.event.inputs.build_target || 'linux-x86_64' }}"   # 改默认这里
            if [[ "$TARGET" == macos* ]]; then
              echo "macOS builds require macos-latest runner. Change runs-on if needed."
              exit 1
            fi
        
            if [[ "$TARGET" == *aarch64 ]]; then
              ARCH="aarch64"
            else
              ARCH="x86_64"
            fi
        
            curl -fsSL -o spc https://dl.static-php.dev/static-php-cli/spc-bin/nightly/spc-linux-${ARCH}
            chmod +x spc
            ./spc --version

      - name: Install build prerequisites (Linux aarch64 compatible)
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            binutils bison flex libtool autoconf automake make patch pkg-config \
            libxml2-dev libsqlite3-dev zlib1g-dev libcurl4-openssl-dev libssl-dev \
            libbz2-dev libjpeg-dev libpng-dev libfreetype6-dev libonig-dev libzip-dev \
            libreadline-dev libgmp-dev libicu-dev libldap2-dev libxslt1-dev \
            libyaml-dev libsnappy-dev libzstd-dev libevent-dev libenchant-2-dev \
            libtidy-dev libpcre2-dev libmemcached-dev libssh2-1-dev \
            libmaxminddb-dev libprotobuf-dev protobuf-compiler \
            libmagickwand-dev libpq-dev unixodbc-dev libodbc1 \
            libsodium-dev libbrotli-dev liblz4-dev librdkafka-dev

      - name: Create craft.yml with maximum reasonable extensions (for Linux)
        run: |
          cat > craft.yml << 'EOF'
          php-version: "${{ github.event.inputs.php_version || '8.5' }}"

          extensions: >-
            amqp apcu ast bcmath brotli bz2 calendar ctype curl dba dio dom ds
            enchant ev event exif ffi fileinfo filter ftp gd gettext gmp iconv
            igbinary imagick imap intl ldap libxml lz4 maxminddb mbregex mbstring
            memcache memcached msgpack mysqli mysqlnd opcache openssl pcntl
            pcov pdo pdo_mysql pdo_odbc pdo_pgsql pdo_sqlite pgsql phar posix
            protobuf rdkafka readline redis session shmop simdjson simplexml
            snappy sockets sodium sqlite3 ssh2 sysvmsg sysvsem sysvshm tidy
            tokenizer uuid xdebug xml xmlreader xmlwriter xsl xz yaml zip zlib zstd

          sapi:
            - cli
            - micro
            - fpm

          download-options:
            prefer-pre-built: true

          build-options:
            strip: true
            # upx: true  # 可选：进一步压缩，但 aarch64 上兼容性需测试
          EOF

      - name: Build static PHP
        run: |
          ./spc doctor --no-check-download
          ./spc download all --clean --with-php=${{ github.event.inputs.php_version || '8.5' }}
          ./spc craft --config craft.yml --arch \( (echo " \){{ github.event.inputs.build_target || 'linux-aarch64' }}" | cut -d- -f2)

      - name: Prepare artifacts
        run: |
          mkdir -p artifacts
          cp dist/* artifacts/ 2>/dev/null || true
          ls -lh artifacts/

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: static-php-\( {{ github.event.inputs.php_version || '8.5' }}- \){{ github.event.inputs.build_target || 'linux-aarch64' }}
          path: artifacts/
          retention-days: 7
