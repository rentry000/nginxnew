name: Build Original Nginx for Android arm64-v8a (NDK r29)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 🌱 克隆原仓库并检查结构
        run: |
          git clone https://github.com/ryanlee486/nginx-android.git
          cd nginx-android
          tree -L 2  # 打印目录结构辅助分析
          find . -name "*.sh" -type f -exec chmod +x {} \;
          echo "✅ 原仓库克隆及权限修复完成"

      - name: 📦 安装依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libssl-dev zlib1g-dev patch wget unzip tree
          echo "✅ 依赖安装完成"

      - name: 📦 配置 Android NDK r29
        run: |
          wget -q https://dl.google.com/android/repository/android-ndk-r29-linux.zip -O ndk.zip
          unzip -q ndk.zip -d /opt
          export ANDROID_NDK_ROOT=/opt/android-ndk-r29
          echo "ANDROID_NDK_ROOT=$ANDROID_NDK_ROOT" >> $GITHUB_ENV
          echo "✅ NDK r29 配置完成"

      - name: 🛠️ 修复补丁路径（关键修复）
        run: |
          cd nginx-android
          if [ -f "scripts/build-android.sh" ]; then
            # 将构建脚本中的补丁路径从 "patches/" 改为实际路径 "src/nginx_patches/"
            sed -i 's|patches/|src/nginx_patches/|g' scripts/build-android.sh
            echo "✅ 构建脚本补丁路径已修正为 src/nginx_patches/"
          else
            echo "❌ 未找到构建脚本，构建无法继续"
            exit 1
          fi

      - name: 🛠️ 验证并修复问题补丁
        run: |
          cd nginx-android
          PATCH_FILE="src/nginx_patches/01-cross-compilation-sizeof.patch"
          if [ -f "$PATCH_FILE" ]; then
            echo "🔍 验证补丁文件: $PATCH_FILE"
            # 验证补丁格式
            if ! patch --dry-run -p1 < "$PATCH_FILE" > /dev/null 2>&1; then
              echo "❌ 补丁格式无效，尝试修复..."
              # 修复补丁（移除非法字符和空行）
              sed -i '/^[^+-@ ]/d' "$PATCH_FILE"
              sed -i '/^[[:space:]]*$/d' "$PATCH_FILE"
              # 再次验证
              if ! patch --dry-run -p1 < "$PATCH_FILE" > /dev/null 2>&1; then
                echo "❌ 补丁无法修复，将跳过"
                rm -f "$PATCH_FILE"
              else
                echo "✅ 补丁修复成功"
              fi
            else
              echo "✅ 补丁格式有效"
            fi
          else
            echo "❌ 未找到问题补丁，构建可能失败"
            exit 1
          fi

      - name: 🧐 最终调试补丁状态
        run: |
          cd nginx-android
          echo "=== 当前补丁文件 ==="
          find . -name "*.patch"
          echo "=== 构建脚本补丁路径 ==="
          grep "src/nginx_patches" scripts/build-android.sh

      - name: 🔨 构建 Nginx for arm64-v8a
        run: |
          cd nginx-android
          export ANDROID_ABI=arm64-v8a
          export ANDROID_NDK_ROOT=$ANDROID_NDK_ROOT
          ./scripts/build-android.sh
          echo "✅ 构建完成"

      - name: 📤 上传构建产物
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: nginx-android-arm64-v8a
          path: nginx-android/build/install/arm64-v8a/
