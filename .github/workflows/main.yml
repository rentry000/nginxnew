name: Build Static PHP 8.5 (linux-aarch64) - Debug Extensions

on:
  workflow_dispatch:
    inputs:
      php_version:
        description: 'PHP Version (支持 8.1 \~ 8.5)'
        required: true
        default: '8.5'
  push:
    branches: [ main ]
    paths:
      - 'craft.yml'

jobs:
  build:
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download prebuilt spc binary (nightly, aarch64)
        run: |
          curl -fsSL -o spc https://dl.static-php.dev/static-php-cli/spc-bin/nightly/spc-linux-aarch64
          chmod +x spc
          ./spc --version

      - name: Install build prerequisites (for arm64 Ubuntu)
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            binutils bison flex libtool autoconf automake make patch pkg-config \
            libxml2-dev libsqlite3-dev zlib1g-dev libcurl4-openssl-dev libssl-dev \
            libbz2-dev libjpeg-dev libpng-dev libfreetype6-dev libonig-dev libzip-dev \
            libreadline-dev libgmp-dev libicu-dev libldap2-dev libxslt1-dev \
            libyaml-dev libsnappy-dev libzstd-dev libevent-dev libenchant-2-dev \
            libtidy-dev libpcre2-dev libmemcached-dev libssh2-1-dev \
            libmaxminddb-dev libpq-dev unixodbc-dev libodbc2 \
            libsodium-dev libbrotli-dev liblz4-dev re2c autopoint gettext

      - name: Create craft.yml (minimal for testing - add your extensions gradually)
        run: |
          cat > craft.yml << 'EOF'
          php-version: "${{ github.event.inputs.php_version || '8.5' }}"

          extensions: >-
            bcmath bz2 ctype curl dom exif fileinfo filter gd gettext gmp iconv intl mbstring mysqli mysqlnd opcache openssl pcntl pdo pdo_mysql pdo_sqlite phar posix readline session simplexml sockets sodium sqlite3 tokenizer xml xmlreader xmlwriter xsl zip zlib

          sapi:
            - cli
            - micro
            - fpm

          download-options:
            prefer-pre-built: true
          EOF

      - name: Check environment with spc doctor
        run: |
          ./spc doctor || true

      - name: Safe clean old caches
        run: |
          rm -rf source downloads buildroot || true

      - name: Download sources and libs (with debug)
        run: |
          ./spc download all --with-php=${{ github.event.inputs.php_version || '8.5' }} --debug

      - name: Build static PHP
        run: |
          ./spc craft --debug

      - name: Prepare artifacts
        run: |
          mkdir -p artifacts
          cp dist/* artifacts/ 2>/dev/null || true
          ls -lh artifacts/ || echo "No files found in dist/"

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: static-php-${{ github.event.inputs.php_version || '8.5' }}-linux-aarch64
          path: artifacts/
          retention-days: 7
