name: Build Nginx for Android arm64-v8a (NDK r29 - qemu 最终根治版)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 🌱 克隆仓库
        run: |
          git clone https://github.com/ryanlee486/nginx-android.git
          cd nginx-android
          find . -name "*.sh" -type f -exec chmod +x {} \;
          echo "✅ 仓库准备完成"

      - name: 📦 安装依赖 + qemu-user-static（关键！解决 Exec format error）
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libssl-dev zlib1g-dev patch wget unzip tree \
            qemu-user-static binfmt-support
          # 确保 qemu-aarch64 可执行（GitHub runner 专用）
          sudo update-binfmts --enable
          echo "✅ qemu-user-static 已安装（aarch64 二进制可直接运行）"

      - name: 📦 配置 NDK r29
        run: |
          wget -q https://dl.google.com/android/repository/android-ndk-r29-linux.zip -O ndk.zip
          unzip -q ndk.zip -d /opt
          echo "ANDROID_NDK_ROOT=/opt/android-ndk-r29" >> $GITHUB_ENV
          echo "✅ NDK 配置完成"

      - name: 🛠️ 清理损坏补丁（01 + 08）
        run: |
          cd nginx-android
          PATCH_DIR="src/nginx_patches"
          rm -f "$PATCH_DIR"/01-cross-compilation-sizeof.patch "$PATCH_DIR"/08-android-cpu-affinity.patch 2>/dev/null || true
          find "$PATCH_DIR" -iname "*sizeof*" -o -iname "*cpu-affinity*" -type f -exec mv {} {}.bak 2>/dev/null \; || true
          
          # 规范化剩余 patch
          find "$PATCH_DIR" -name "*.patch" -type f -exec sh -c '
            tr -d "\r" < "$1" > "$1.tmp" && mv "$1.tmp" "$1"
            [ -n "$(tail -c1 "$1")" ] && echo >> "$1"
          ' _ {} \;
          echo "✅ 坏补丁已彻底清理 + patch 规范化完成"

      - name: 🔨 构建（使用 qemu 让 sizeof 测试正常运行）
        run: |
          cd nginx-android
          export ANDROID_ABI=arm64-v8a
          export ANDROID_NDK_ROOT=/opt/android-ndk-r29
          export CFLAGS="${CFLAGS} -DNGX_HAVE_SCHED_SETAFFINITY=0"
          set -exo pipefail
          ./scripts/build-android.sh 2>&1 | tee build.log
          echo "✅ 构建完成（日志已保存）"

      - name: 📤 上传产物与日志
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nginx-build-artifacts
          path: |
            nginx-android/build/install/arm64-v8a/
            nginx-android/build.log

      - name: 📋 构建摘要
        if: always()
        run: |
          echo "=== 最后 60 行关键日志 ==="
          tail -n 60 nginx-android/build.log | grep -A 30 -E "error|failed|sizeof|Exec|detect|int size|bytes|qemu|✅|🚀" || tail -n 50 nginx-android/build.log
