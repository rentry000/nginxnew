name: Build Static PHP 8.5.4RC1 (使用你指定的官方 RC1 地址)

on:
  workflow_dispatch:
    inputs:
      php_version:
        description: 'PHP Version'
        required: true
        default: '8.5'
  push:
    branches: [ main ]
    paths:
      - 'craft.yml'

jobs:
  build:
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download prebuilt spc binary (nightly aarch64)
        run: |
          curl -fsSL -o spc https://dl.static-php.dev/static-php-cli/spc-bin/nightly/spc-linux-aarch64
          chmod +x spc
          ./spc --version

      - name: Install build prerequisites
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            binutils bison flex libtool autoconf automake make patch pkg-config git \
            libxml2-dev libsqlite3-dev zlib1g-dev libcurl4-openssl-dev libssl-dev \
            libbz2-dev libjpeg-dev libpng-dev libfreetype6-dev libonig-dev libzip-dev \
            libreadline-dev libgmp-dev libicu-dev libsodium-dev libbrotli-dev re2c autopoint gettext

      - name: Create craft.yml (官方示例配置)
        run: |
          cat > craft.yml << 'EOF'
          php-version: "${{ github.event.inputs.php_version || '8.5' }}"

          extensions: "apcu,bcmath,calendar,ctype,curl,dba,dom,exif,fileinfo,filter,gd,iconv,mbregex,mbstring,mysqli,mysqlnd,opcache,openssl,pcntl,pdo,pdo_mysql,pdo_sqlite,phar,posix,readline,redis,session,simplexml,sockets,sodium,sqlite3,tokenizer,xml,xmlreader,xmlwriter,xsl,zip,zlib"

          sapi:
            - cli
            - micro
            - fpm

          download-options:
            prefer-pre-built: true
          EOF

      - name: Check environment
        run: |
          ./spc doctor || true

      - name: Safe clean caches
        run: |
          rm -rf downloads buildroot || true

      - name: 下载你指定的 PHP 8.5.4RC1 源码（官方 RC1 地址）
        run: |
          mkdir -p source/php-src downloads
          echo "正在下载 https://downloads.php.net/\~daniels/php-8.5.4RC1.tar.gz ..."
          curl -L -o downloads/php-8.5.4RC1.tar.gz https://downloads.php.net/\~daniels/php-8.5.4RC1.tar.gz
          
          # 关键检查：确保下载的是真实 tar.gz（>20MB）
          FILE_SIZE=$(stat -c %s downloads/php-8.5.4RC1.tar.gz)
          echo "下载文件大小: $((FILE_SIZE/1024/1024)) MB"
          if [ "$FILE_SIZE" -lt 20000000 ]; then
            echo "❌ 下载的文件太小（可能是错误页），请稍后重试"
            exit 1
          fi
          
          echo "解压到 source/php-src/ ..."
          tar -xzf downloads/php-8.5.4RC1.tar.gz -C source/php-src --strip-components=1
          echo "✅ PHP 源码准备完成！"

      - name: Download 其他库（php-src 已存在，跳过查询）
        run: |
          ./spc download all --with-php=8.5 --ignore-cache-sources=php-src --debug

      - name: Build static PHP
        run: |
          ./spc craft --debug

      - name: Prepare artifacts
        run: |
          mkdir -p artifacts
          cp dist/* artifacts/ 2>/dev/null || true
          ls -lh artifacts/

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: static-php-8.5.4RC1-linux-aarch64
          path: artifacts/
          retention-days: 7
