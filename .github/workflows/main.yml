name: Build Custom Caddy ARM64 (Latest v2.11.1)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-caddy:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go_version: ["1.23"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go Environment
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go_version }}

      - name: Install xcaddy (pre-built amd64)
        run: |
          wget https://github.com/caddyserver/xcaddy/releases/download/v0.4.5/xcaddy_0.4.5_linux_amd64.tar.gz
          tar -xzf xcaddy_0.4.5_linux_amd64.tar.gz
          chmod +x xcaddy
          ./xcaddy version   # 只打印 xcaddy 版本，确认工具可用

      - name: Build Caddy v2.11.1 with Plugins for linux/arm64
        run: |
          GOOS=linux GOARCH=arm64 \
            ./xcaddy build v2.11.1 \
              --with github.com/fabriziosalmi/caddy-waf \
              --with github.com/mholt/caddy-webdav \
              --with github.com/caddy-dns/route53@v1.6.0 \
              --output ./caddy-arm64

      - name: Show Build Result Info (optional, safe on amd64)
        run: |
          file ./caddy-arm64
          ls -lh ./caddy-arm64
          sha256sum ./caddy-arm64 || true

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: caddy-arm64-custom-v2.11.1
          path: ./caddy-arm64
          retention-days: 14

      - name: Publish to GitHub Releases (on main branch)
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          files: ./caddy-arm64
          tag_name: caddy-arm64-v$(./caddy-arm64 version 2>/dev/null | awk '{print $2}' | tr -d '\n\r' || echo "unknown")
          name: Custom Caddy ARM64 v2.11.1
          draft: false
          prerelease: false
          body: |
            Custom build of **Caddy v2.11.1** for linux/arm64 with plugins:
            - github.com/fabriziosalmi/caddy-waf
            - github.com/mholt/caddy-webdav
            - github.com/caddy-dns/route53@v1.6.0
            
            Built using xcaddy v0.4.5 on Go ${{ matrix.go_version }}
            
            Note: This is a cross-compiled binary for ARM64 (aarch64). 
            Do not attempt to run it on x86_64 machines without emulation.
