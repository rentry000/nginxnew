name: Build Static PHP 8.5 RC1 (manual clone bypass)

on:
  workflow_dispatch:
    inputs:
      php_version:
        description: 'PHP Version'
        required: true
        default: '8.5'
  push:
    branches: [ main ]
    paths:
      - 'craft.yml'

jobs:
  build:
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download prebuilt spc binary (nightly, aarch64)
        run: |
          curl -fsSL -o spc https://dl.static-php.dev/static-php-cli/spc-bin/nightly/spc-linux-aarch64
          chmod +x spc
          ./spc --version

      - name: Install build prerequisites
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            binutils bison flex libtool autoconf automake make patch pkg-config git \
            libxml2-dev libsqlite3-dev zlib1g-dev libcurl4-openssl-dev libssl-dev \
            libbz2-dev libjpeg-dev libpng-dev libfreetype6-dev libonig-dev libzip-dev \
            libreadline-dev libgmp-dev libicu-dev \
            libsodium-dev libbrotli-dev re2c autopoint gettext

      - name: Create craft.yml (official example)
        run: |
          cat > craft.yml << 'EOF'
          php-version: "${{ github.event.inputs.php_version || '8.5' }}"

          extensions: "apcu,bcmath,calendar,ctype,curl,dba,dom,exif,fileinfo,filter,gd,iconv,mbregex,mbstring,mysqli,mysqlnd,opcache,openssl,pcntl,pdo,pdo_mysql,pdo_sqlite,phar,posix,readline,redis,session,simplexml,sockets,sodium,sqlite3,tokenizer,xml,xmlreader,xmlwriter,xsl,zip,zlib"

          sapi:
            - cli
            - micro
            - fpm

          download-options:
            prefer-pre-built: true
          EOF

      - name: Check environment
        run: |
          ./spc doctor || true

      - name: Safe clean caches (except php-src)
        run: |
          rm -rf downloads buildroot || true

      - name: Manually clone PHP 8.5.4RC1 source
        run: |
          mkdir -p source/php-src
          cd source/php-src
          git init
          git remote add origin https://github.com/php/php-src.git
          git fetch --depth 1 origin tag php-8.5.4RC1
          git checkout FETCH_HEAD
          cd ../../

      - name: Download other sources (skip php-src)
        run: |
          ./spc download all --with-php=8.5 --ignore-cache-sources=php-src --debug

      - name: Build static PHP
        run: |
          ./spc craft --debug

      - name: Prepare artifacts
        run: |
          mkdir -p artifacts
          cp dist/* artifacts/ 2>/dev/null || true
          ls -lh artifacts/

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: static-php-8.5.4RC1-aarch64
          path: artifacts/
          retention-days: 7
