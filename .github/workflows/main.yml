name: Build Static PHP 8.5 RC1 (with custom source tar.gz)

on:
  workflow_dispatch:
    inputs:
      php_version:
        description: 'PHP Version (use 8.5 for RC1)'
        required: true
        default: '8.5'
  push:
    branches: [ main ]
    paths:
      - 'craft.yml'

jobs:
  build:
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download prebuilt spc binary (nightly, aarch64)
        run: |
          curl -fsSL -o spc https://dl.static-php.dev/static-php-cli/spc-bin/nightly/spc-linux-aarch64
          chmod +x spc
          ./spc --version

      - name: Install build prerequisites
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            binutils bison flex libtool autoconf automake make patch pkg-config \
            libxml2-dev libsqlite3-dev zlib1g-dev libcurl4-openssl-dev libssl-dev \
            libbz2-dev libjpeg-dev libpng-dev libfreetype6-dev libonig-dev libzip-dev \
            libreadline-dev libgmp-dev libicu-dev \
            libsodium-dev libbrotli-dev re2c autopoint gettext git

      - name: Create craft.yml (official example config)
        run: |
          cat > craft.yml << 'EOF'
          php-version: "${{ github.event.inputs.php_version || '8.5' }}"

          extensions: "apcu,bcmath,calendar,ctype,curl,dba,dom,exif,fileinfo,filter,gd,iconv,mbregex,mbstring,mysqli,mysqlnd,opcache,openssl,pcntl,pdo,pdo_mysql,pdo_sqlite,phar,posix,readline,redis,session,simplexml,sockets,sodium,sqlite3,tokenizer,xml,xmlreader,xmlwriter,xsl,zip,zlib"

          sapi:
            - cli
            - micro
            - fpm

          download-options:
            prefer-pre-built: true
          EOF

      - name: Check environment
        run: |
          ./spc doctor || true

      - name: Safe clean caches
        run: |
          rm -rf source downloads buildroot || true

      - name: Download sources with custom PHP tar.gz
        run: |
          ./spc download all \
            --with-php=${{ github.event.inputs.php_version || '8.5' }} \
            -U "php-src:https://downloads.php.net/\~daniels/php-8.5.4RC1.tar.gz" \
            --debug

      - name: Build static PHP
        run: |
          ./spc craft --debug

      - name: Prepare artifacts
        run: |
          mkdir -p artifacts
          cp dist/* artifacts/ 2>/dev/null || true
          ls -lh artifacts/

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: static-php-8.5.4RC1-aarch64
          path: artifacts/
          retention-days: 7
