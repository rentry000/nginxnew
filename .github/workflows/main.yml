name: Build Latest Nginx Static Binary + Dynamic Modules for Android arm64-v8a (NDK r29 - Full + geoip2 + perl)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 🌱 准备环境 + NDK r29
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential wget unzip tree patch perl git libgd-dev libxslt1-dev

          wget -q https://dl.google.com/android/repository/android-ndk-r29-linux.zip -O ndk.zip
          unzip -q ndk.zip -d /opt
          echo "ANDROID_NDK_ROOT=/opt/android-ndk-r29" >> $GITHUB_ENV

      - name: 📦 下载 Nginx + 依赖 + geoip2 模块源码
        run: |
          # Nginx
          wget https://nginx.org/download/nginx-1.28.2.tar.gz
          tar -xzf nginx-1.28.2.tar.gz

          # Zlib
          wget https://zlib.net/zlib-1.3.2.tar.gz
          tar -xzf zlib-1.3.2.tar.gz

          # PCRE2
          wget https://github.com/PCRE2Project/pcre2/releases/download/pcre2-10.44/pcre2-10.44.tar.gz
          tar -xzf pcre2-10.44.tar.gz

          # OpenSSL
          wget https://www.openssl.org/source/openssl-3.3.2.tar.gz
          tar -xzf openssl-3.3.2.tar.gz

          # libmaxminddb (geoip2 需要)
          git clone https://github.com/maxmind/libmaxminddb.git
          cd libmaxminddb
          git fetch --tags  # 确保所有 tag 被 fetch
          git checkout 1.13.2 || git checkout 1.9.1  # fallback to older if needed
          cd ..

          # ngx_http_geoip2_module
          git clone https://github.com/leev/ngx_http_geoip2_module.git

          echo "源码目录检查:"
          ls -la nginx-1.28.2/auto/configure || echo "configure missing!"

      - name: 🩹 注入 stubs + 权限修复
        run: |
          cd nginx-1.28.2
          chmod +x auto/configure
          ls -l auto/configure

          cat > auto/types/sizeof << 'EOF'
          #!/bin/sh
          case "$1" in
            int|unsigned\ int) echo " 4 bytes" ;;
            long|unsigned\ long|size_t|off_t|time_t|"void *") echo " 8 bytes" ;;
            "long long"|"unsigned long long") echo " 8 bytes" ;;
            *) echo " 8 bytes" ;;
          esac
          EOF
          chmod +x auto/types/sizeof

          echo " 8 bytes" > auto/types/uintptr
          echo " little endian" > auto/endianness

      - name: 🔨 Configure Nginx - All Modules + geoip2 + perl dynamic
        run: |
          cd nginx-1.28.2

          TOOLCHAIN=/opt/android-ndk-r29/toolchains/llvm/prebuilt/linux-x86_64
          export PATH=$TOOLCHAIN/bin:$PATH

          export CC="aarch64-linux-android28-clang --sysroot=$TOOLCHAIN/sysroot"
          export AR="llvm-ar"
          export RANLIB="llvm-ranlib"
          export LD="ld.lld"
          export STRIP="llvm-strip"

          export CFLAGS="-Os -fPIC -fPIE -DNGX_HAVE_SCHED_SETAFFINITY=0"
          export LDFLAGS="-static -pie -Wl,--gc-sections -Wl,--strip-all -fuse-ld=lld"

          ./auto/configure \
            --prefix=/data/local/tmp/nginx \
            --with-cc="$CC" \
            --with-cc-opt="$CFLAGS" \
            --with-ld-opt="$LDFLAGS" \
            --with-zlib=../zlib-1.3.2 \
            --with-pcre=../pcre2-10.44 \
            --with-openssl=../openssl-3.3.2 \
            --with-http_ssl_module \
            --with-http_v2_module \
            --with-http_v3_module \
            --with-http_gzip_static_module \
            --with-http_stub_status_module \
            --with-http_realip_module \
            --with-http_addition_module \
            --with-http_sub_module \
            --with-http_dav_module \
            --with-http_flv_module \
            --with-http_mp4_module \
            --with-http_gunzip_module \
            --with-http_auth_request_module \
            --with-http_random_index_module \
            --with-http_secure_link_module \
            --with-http_slice_module \
            --with-http_auth_basic_module \
            --with-http_charset_module \
            --with-http_geoip_module=dynamic \
            --with-http_image_filter_module=dynamic \
            --with-http_xslt_module=dynamic \
            --with-http_perl_module=dynamic \
            --with-mail \
            --with-mail_ssl_module \
            --with-stream \
            --with-stream_ssl_module \
            --with-stream_realip_module \
            --with-stream_geoip_module=dynamic \
            --with-stream_return_module \
            --with-stream_set_module \
            --with-stream_upstream_hash_module \
            --with-stream_upstream_least_conn_module \
            --with-stream_upstream_random_module \
            --with-threads \
            --with-file-aio \
            --with-poll_module \
            --with-select_module \
            --add-dynamic-module=../ngx_http_geoip2_module \
            --without-http_rewrite_module \
            2>&1 | tee ../configure.log || (echo "Configure failed!"; cat objs/config.log 2>/dev/null | tail -n 80; exit 1)

          ls -l Makefile objs/*.so 2>/dev/null || echo "动态模块未生成"

      - name: 🔨 Make + 提取二进制 & 动态模块
        run: |
          cd nginx-1.28.2
          make -j$(nproc) || exit 1
          mkdir -p ../build/install/arm64-v8a/sbin ../build/install/arm64-v8a/modules ../build/install/arm64-v8a/conf
          cp objs/nginx ../build/install/arm64-v8a/sbin/nginx
          cp objs/*.so ../build/install/arm64-v8a/modules/ 2>/dev/null || echo "No .so modules generated"
          cp -r conf/* ../build/install/arm64-v8a/conf/
          file ../build/install/arm64-v8a/sbin/nginx
          ls -lh ../build/install/arm64-v8a/modules/

      - name: 📤 上传产物
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nginx-arm64-static-full-modules
          path: |
            build/install/arm64-v8a/
            configure.log
            make.log
            nginx-1.28.2/objs/config.log

      - name: 📋 诊断
        if: always()
        run: |
          tail -n 80 configure.log 2>/dev/null || echo "No configure log"
