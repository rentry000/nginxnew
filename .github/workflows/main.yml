name: Build Nginx arm64-v8a Static (Android compatible)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download NDK r29
        run: |
          wget -q https://dl.google.com/android/repository/android-ndk-r29-linux.zip -O ndk.zip
          unzip -q ndk.zip -d /opt

      - name: Download Nginx 1.29.5
        run: |
          wget https://nginx.org/download/nginx-1.29.5.tar.gz
          tar -xzf nginx-1.29.5.tar.gz

      - name: Build Nginx
        run: |
          cd nginx-1.29.5
          TOOLCHAIN=/opt/android-ndk-r29/toolchains/llvm/prebuilt/linux-x86_64
          export PATH=$TOOLCHAIN/bin:$PATH
          export CC=aarch64-linux-android28-clang
          export AR=llvm-ar
          export RANLIB=llvm-ranlib
          export LD=ld.lld

          ./configure \
            --prefix=/data/local/tmp/nginx \
            --sbin-path=nginx \
            --conf-path=nginx.conf \
            --pid-path=nginx.pid \
            --lock-path=nginx.lock \
            --error-log-path=stderr \
            --http-log-path=access.log \
            --with-cc=$CC \
            --with-cc-opt="-Os -fPIC -fPIE" \
            --with-ld-opt="-Wl,--gc-sections -Wl,--strip-all" \
            --with-http_ssl_module \
            --with-http_v2_module \
            --with-http_v3_module \
            --with-stream \
            --with-stream_ssl_module \
            --with-threads \
            --with-file-aio \
            --with-poll_module \
            --with-http_fastcgi_module \
            --without-http_rewrite_module

          make -j$(nproc)

      - name: Upload nginx binary
        uses: actions/upload-artifact@v4
        with:
          name: nginx-arm64
          path: nginx-1.29.5/objs/nginx
