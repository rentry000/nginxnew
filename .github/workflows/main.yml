name: Build Custom Caddy ARM64

on:
  workflow_dispatch:  # 允许手动触发构建

jobs:
  build-caddy:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go_version: [1.21.0]  # 固定 Go 版本

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Go Environment
      uses: actions/setup-go@v4
      with:
        go-version: ${{ matrix.go_version }}

    - name: Cache Go modules
      uses: actions/cache@v3
      with:
        path: ~/go/pkg/mod
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-

    - name: Install xcaddy ARM64
      run: |
        wget https://github.com/caddyserver/xcaddy/releases/download/v0.4.5/xcaddy_0.4.5_linux_arm64.tar.gz
        tar -xzf xcaddy_0.4.5_linux_arm64.tar.gz
        chmod +x xcaddy
        export PATH="$PATH:$(pwd)"

    - name: Build Caddy with Plugins
      run: |
        ./xcaddy build \
          --with github.com/fabriziosalmi/caddy-waf \
          --with github.com/mholt/caddy-webdav \
          --with github.com/caddy-dns/route53@1.6.0 \
          --output ./caddy-arm64 \
          --tags linux_arm64  # 明确指定架构标签

    - name: Verify Build
      run: |
        ./caddy-arm64 version | grep -E "Caddy v[0-9]+\.[0-9]+\.[0-9]+"
        ./caddy-arm64 validate-config --config /dev/null

    - name: Upload Artifact
      uses: actions/upload-artifact@v3
      with:
        name: caddy-arm64-custom
        path: ./caddy-arm64
        retention-days: 14

    - name: Publish to GitHub Releases
      if: github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v1
      with:
        files: ./caddy-arm64
        draft: false
        prerelease: false
        tag_name: "caddy-arm64-$(./caddy-arm64 version | cut -d' ' -f2)"
