name: Build Nginx arm64-v8a Static for Android (Fixed Wrapper Path)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download NDK r29
        run: |
          wget -q https://dl.google.com/android/repository/android-ndk-r29-linux.zip -O ndk.zip
          unzip -q ndk.zip -d /opt

      - name: Download Nginx 1.29.5
        run: |
          wget https://nginx.org/download/nginx-1.29.5.tar.gz
          tar -xzf nginx-1.29.5.tar.gz

      - name: Create CC wrapper in absolute path
        run: |
          TOOLCHAIN=/opt/android-ndk-r29/toolchains/llvm/prebuilt/linux-x86_64
          cat > /tmp/cc-wrapper << 'EOF'
          #!/bin/bash
          exec $TOOLCHAIN/bin/aarch64-linux-android28-clang \
            -target aarch64-linux-android28 \
            --sysroot=$TOOLCHAIN/sysroot \
            -B$TOOLCHAIN/bin \
            "$@"
          EOF
          chmod +x /tmp/cc-wrapper

      - name: Build Nginx
        run: |
          cd nginx-1.29.5
          TOOLCHAIN=/opt/android-ndk-r29/toolchains/llvm/prebuilt/linux-x86_64
          export PATH=$TOOLCHAIN/bin:$PATH
          export CC=/tmp/cc-wrapper  # 使用绝对路径，避免相对路径失效
          export AR=$TOOLCHAIN/bin/llvm-ar
          export RANLIB=$TOOLCHAIN/bin/llvm-ranlib
          export LD=$TOOLCHAIN/bin/ld.lld

          export CFLAGS="-Os -fPIC -fPIE"
          export LDFLAGS="-static -pie -Wl,--gc-sections -Wl,--strip-all"

          ./configure \
            --prefix=/data/local/tmp/nginx \
            --sbin-path=nginx \
            --conf-path=nginx.conf \
            --pid-path=nginx.pid \
            --lock-path=nginx.lock \
            --error-log-path=stderr \
            --http-log-path=access.log \
            --with-cc=$CC \
            --with-cc-opt="$CFLAGS" \
            --with-ld-opt="$LDFLAGS" \
            --with-http_ssl_module \
            --with-http_v2_module \
            --with-http_v3_module \
            --with-stream \
            --with-stream_ssl_module \
            --with-threads \
            --with-file-aio \
            --with-poll_module \
            --without-http_rewrite_module

          make -j$(nproc)

      - name: Upload nginx binary
        uses: actions/upload-artifact@v4
        with:
          name: nginx-arm64-static
          path: nginx-1.29.5/objs/nginx
