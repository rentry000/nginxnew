name: Build Custom Caddy ARM64 (FrankenPHP + Python + All Plugins)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-caddy:
    runs-on: ubuntu-24.04-arm
    strategy:
      matrix:
        go_version: ["1.26"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build in Alpine ARM64 (Musl libc) and Extract Dependencies
        run: |
          docker run --rm --platform linux/arm64 \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            -e GH_TOKEN=${{ secrets.GITHUB_TOKEN_PAT }} \
            -e GOPROXY=https://goproxy.cn,direct \
            -e CGO_ENABLED=1 \
            -e GOOS=linux \
            -e GOARCH=arm64 \
            alpine:latest /bin/sh -c "
              # 1. 安装 Alpine 编译依赖
              apk update && \
              apk add --no-cache --repository=https://dl-cdn.alpinelinux.org/alpine/edge/community go && \
              apk add --no-cache gcc g++ musl-dev python3-dev git wget linux-headers make \
              libxml2-dev openssl-dev bzip2-dev curl-dev libpng-dev libjpeg-turbo-dev \
              freetype-dev icu-dev libzip-dev oniguruma-dev libucontext-dev \
              brotli-dev argon2-dev libedit-dev && \
              
              # 2. 安装 xcaddy
              wget https://github.com/caddyserver/xcaddy/releases/download/v0.4.5/xcaddy_0.4.5_linux_arm64.tar.gz && \
              tar -xzf xcaddy_0.4.5_linux_arm64.tar.gz && \
              chmod +x xcaddy && \

              # 3. 克隆插件 (保留所有原始逻辑)
              git clone https://\$GH_TOKEN@github.com/hslatman/caddy-crowdsec-bouncer.git crowdsec-plugin && \
              (cd crowdsec-plugin && git checkout main || true) && \
              git clone https://github.com/W0n9/caddy_waf_t1k.git caddy_waf_t1k && \
              git clone https://github.com/chaitin/t1k-go.git t1k-go && \

              # 4. 【核心修复】：彻底重写 Watcher CGO 链接链
              echo '=== 深度修补 Watcher 源码与平铺实现文件 ===' && \
              git clone --depth 1 https://github.com/e-dant/watcher.git local-watcher && \
              # 将 wtr 目录下的所有实现文件 (.cpp/.hpp) 平铺到 watcher-go 目录下
              # 这是为了让 CGO 在处理 watcher.go 时能直接找到同级的源码进行编译
              cp -rv local-watcher/include/wtr/* local-watcher/watcher-go/ && \
              # 确保 watcher-c.h 存在且定义正确
              printf \"#ifndef WTR_WATCHER_C_H\n#define WTR_WATCHER_C_H\ntypedef void* watcher_t;\n#endif\n\" > local-watcher/watcher-go/watcher-c.h && \
              
              # 5. 设置 CGO 标志 (强化 C++17 支持和动态库链接)
              PHP_INC=\$(find /usr/include -name \"php\" -type d | head -n 1) && \
              export CGO_CFLAGS=\"\$(python3-config --cflags) -I\$PHP_INC -I\$PHP_INC/main -I\$PHP_INC/TSRM -I\$PHP_INC/Zend\" && \
              # 显式告知 CGO 使用 C++17 标准处理 watcher 的源码
              export CGO_CXXFLAGS=\"-std=c++17\" && \
              export CGO_LDFLAGS=\"\$(python3-config --embed --ldflags || python3-config --ldflags) -lphp83 -lstdc++\" && \
              export CXX=g++ && \
              
              # 6. 执行编译 (恢复所有插件与路径)
              ./xcaddy build v2.11.2 \
                --with github.com/dunglas/frankenphp/caddy \
                --with github.com/mliezun/caddy-snake \
                --with github.com/mholt/caddy-webdav \
                --with github.com/caddy-dns/route53@v1.6.0 \
                --with github.com/caddyserver/replace-response \
                --with github.com/caddyserver/transform-encoder \
                --with github.com/caddyserver/cache-handler \
                --with github.com/caddy-dns/cloudflare \
                --with github.com/caddy-dns/duckdns \
                --with github.com/greenpau/caddy-security \
                --with github.com/mholt/caddy-l4 \
                --with github.com/caddyserver/nginx-adapter \
                --with github.com/caddyserver/ntlm-transport \
                --with github.com/mholt/caddy-dynamicdns \
                --with github.com/sagikazarmark/caddy-fs-s3 \
                --with github.com/ueffel/caddy-brotli \
                --with github.com/corazawaf/coraza-caddy/v2 \
                --with github.com/mholt/caddy-ratelimit \
                --with github.com/invzhi/caddy-docker-upstreams \
                --with github.com/hslatman/caddy-crowdsec-bouncer \
                --with github.com/mholt/caddy-events-exec \
                --with github.com/caddyserver/forwardproxy \
                --with github.com/kirsch33/realip \
                --with github.com/sjtug/caddy2-filter \
                --with github.com/lucaslorentz/caddy-docker-proxy/v2 \
                --with github.com/caddyserver/circuitbreaker \
                --with github.com/caddyserver/jsonc-adapter \
                --with github.com/caddyserver/json5-adapter \
                --with github.com/SakuraHentai/caddy-dynamic-routing \
                --with github.com/ysicing/caddy2-geocn \
                --with github.com/steffenbusch/caddy-placeholder-dump \
                --with github.com/hslatman/caddy-crowdsec-bouncer/appsec \
                --with github.com/hslatman/caddy-crowdsec-bouncer/layer4 \
                --with github.com/libdns/cloudflare \
                --with github.com/porech/caddy-maxmind-geolocation \
                --with github.com/hslatman/caddy-crowdsec-bouncer/http \
                --with pkg.jsn.cam/caddy-defender@v0.10.0 \
                --replace github.com/e-dant/watcher=./local-watcher \
                --replace github.com/W0n9/caddy_waf_t1k=./caddy_waf_t1k \
                --replace github.com/chaitin/t1k-go=./t1k-go \
                --replace github.com/hslatman/caddy-crowdsec-bouncer=./crowdsec-plugin \
                --output ./caddy-arm64 && \

              # 7. 提取依赖库并打包
              echo '=== 开始提取运行库 ===' && \
              mkdir -p ./caddy-bundle/lib && \
              mv ./caddy-arm64 ./caddy-bundle/ && \
              ( ldd ./caddy-bundle/caddy-arm64 | grep '=> /' | awk '{print \$3}' | xargs -I '{}' cp '{}' ./caddy-bundle/lib/ || true ) && \
              ( cp /lib/ld-musl-aarch64.so.1 ./caddy-bundle/lib/ || true ) && \
              
              echo '#!/bin/sh' > ./caddy-bundle/run.sh && \
              echo 'DIR=\"\$(cd \"\$(dirname \"\$0\")\" && pwd)\"' >> ./caddy-bundle/run.sh && \
              echo 'export LD_LIBRARY_PATH=\"\$DIR/lib:\$LD_LIBRARY_PATH\"' >> ./caddy-bundle/run.sh && \
              echo 'exec \"\$DIR/lib/ld-musl-aarch64.so.1\" -- \"\$DIR/caddy-arm64\" \"\$@\"' >> ./caddy-bundle/run.sh && \
              chmod +x ./caddy-bundle/run.sh ./caddy-bundle/caddy-arm64 ./caddy-bundle/lib/ld-musl-aarch64.so.1 && \
              tar -czvf caddy-arm64-bundle.tar.gz ./caddy-bundle
            "

      - name: Show Build Result Info
        run: ls -lh caddy-arm64-bundle.tar.gz

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: caddy-arm64-bundle
          path: caddy-arm64-bundle.tar.gz
