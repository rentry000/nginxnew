name: Build Nginx for Android arm64-v8a

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (optional, but good practice)
        uses: actions/checkout@v4

      - name: Clone nginx-android repository
        run: git clone https://github.com/ryanlee486/nginx-android.git

      - name: Download Android NDK r27
        run: |
          wget -q https://dl.google.com/android/repository/android-ndk-r27-linux.zip -O ndk.zip
          unzip -q ndk.zip -d /opt
          echo "ANDROID_NDK_ROOT=/opt/android-ndk-r27" >> $GITHUB_ENV

      - name: Modify build script to skip problematic patch
        run: |
          cd nginx-android

          # 备份原始脚本（可选）
          cp scripts/build-android.sh scripts/build-android.sh.bak

          # 方法1：直接删除包含 '01-cross-compilation-sizeof.patch' 的行
          sed -i '/01-cross-compilation-sizeof.patch/d' scripts/build-android.sh

          # 方法2（备用）：如果上面没生效，也可以尝试注释掉（取消下面一行的注释）
          # sed -i 's/.*01-cross-compilation-sizeof\.patch.*/# &/' scripts/build-android.sh

          # Debug: 打印相关行确认已移除
          echo "Patching lines after modification:"
          grep -n "01-cross-compilation-sizeof" scripts/build-android.sh || echo "Patch line successfully removed."

      - name: Build Nginx for arm64-v8a
        run: |
          cd nginx-android
          export ANDROID_NDK_ROOT=/opt/android-ndk-r27
          # 注意：你原命令中的 ANDROID_ARCHS=x86_64 可能是笔误，这里只构建 arm64-v8a
          ./scripts/build-android.sh --arch arm64-v8a

      - name: Package binary
        run: |
          mkdir -p artifacts
          cp nginx-android/build/nginx-arm64-v8a/nginx artifacts/nginx-arm64
          cd artifacts
          zip -r ../nginx-arm64-magisk.zip .

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: Nginx Android arm64-v8a Binary
          files: nginx-arm64-magisk.zip
          draft: false
