name: Build Static PHP 8.5.2

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'craft.yml'

jobs:
  build:
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download prebuilt spc binary (nightly aarch64)
        run: |
          curl -fsSL -o spc https://dl.static-php.dev/static-php-cli/spc-bin/nightly/spc-linux-aarch64
          chmod +x spc
          ./spc --version

      - name: Install build prerequisites
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            binutils bison flex libtool autoconf automake make patch pkg-config git \
            libxml2-dev libsqlite3-dev zlib1g-dev libcurl4-openssl-dev libssl-dev \
            libbz2-dev libjpeg-dev libpng-dev libfreetype6-dev libonig-dev libzip-dev \
            libreadline-dev libgmp-dev libicu-dev libsodium-dev libbrotli-dev \
            re2c autopoint gettext

      - name: Create craft.yml (官方示例配置)
        run: |
          cat > craft.yml << 'EOF'
          php-version: "8.5.2"

          extensions: "apcu,bcmath,calendar,ctype,curl,dba,dom,exif,fileinfo,filter,gd,iconv,mbregex,mbstring,mysqli,mysqlnd,opcache,openssl,pcntl,pdo,pdo_mysql,pdo_sqlite,phar,posix,readline,redis,session,simplexml,sockets,sodium,sqlite3,tokenizer,xml,xmlreader,xmlwriter,xsl,zip,zlib"

          sapi:
            - cli
            - micro
            - fpm

          download-options:
            prefer-pre-built: true
          EOF

      - name: Check environment
        run: |
          ./spc doctor || true

      - name: Safe clean caches (保留 source/php-src)
        run: |
          rm -rf downloads buildroot || true

      - name: 手动下载并解压官方 PHP 8.5.2 到 source/php-src
        run: |
          mkdir -p source/php-src downloads
          curl -L -o downloads/php-8.5.2.tar.gz https://www.php.net/distributions/php-8.5.2.tar.gz
          tar -xzf downloads/php-8.5.2.tar.gz -C source/php-src --strip-components=1
          echo "PHP 源码已准备好"
          ls -lh source/php-src | head -n 5

      - name: Download 依赖并构建 static PHP（合并步骤）
        run: |
          ./spc download all --with-php=8.5.2 --ignore-cache-sources=php-src --debug || true
          echo "Download 完成，开始构建..."
          ./spc craft --debug

      - name: Prepare artifacts
        run: |
          mkdir -p artifacts
          cp dist/* artifacts/ 2>/dev/null || true
          ls -lh artifacts/ || echo "dist 目录为空或不存在"

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: static-php-8.5.2-linux-aarch64
          path: artifacts/
          retention-days: 7
