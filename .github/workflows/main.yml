name: Build Nginx for Android arm64-v8a (NDK r29 - 完整修复版)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 🌱 克隆仓库
        run: |
          git clone https://github.com/ryanlee486/nginx-android.git
          cd nginx-android
          find . -name "*.sh" -type f -exec chmod +x {} \;
          echo "✅ 仓库准备完成"

      - name: 📦 安装依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libssl-dev zlib1g-dev patch wget unzip tree
          echo "✅ 依赖安装完成"

      - name: 📦 配置 NDK r29
        run: |
          wget -q https://dl.google.com/android/repository/android-ndk-r29-linux.zip -O ndk.zip
          unzip -q ndk.zip -d /opt
          echo "ANDROID_NDK_ROOT=/opt/android-ndk-r29" >> $GITHUB_ENV
          echo "✅ NDK 配置完成"

      - name: 🛠️ 根治损坏补丁（01 + 08）并规范化
        run: |
          cd nginx-android
          PATCH_DIR="src/nginx_patches"
          
          # 1. 删除已知坏补丁（sizeof 旧版 + cpu-affinity）
          for bad_patch in "01-cross-compilation-sizeof.patch" "08-android-cpu-affinity.patch"; do
            if [ -f "$PATCH_DIR/$bad_patch" ]; then
              rm -f "$PATCH_DIR/$bad_patch"
              echo "✅ 已删除损坏补丁: $bad_patch"
            else
              echo "⚠️  $bad_patch 不存在（已处理）"
            fi
          done
          
          # 2. 重命名残留（防御）
          find "$PATCH_DIR" -iname "*sizeof*" -o -iname "*cpu-affinity*" -type f -exec mv {} {}.bak 2>/dev/null \; || true
          echo "✅ [步骤2] 已清理残留补丁"
          
          # 3. 规范化所有剩余 patch（防止 malformed）
          echo "🔧 正在修复所有 patch 文件行结束符..."
          find "$PATCH_DIR" -name "*.patch" -type f -exec sh -c '
            tr -d "\r" < "$1" > "$1.tmp" && mv "$1.tmp" "$1"
            [ -n "$(tail -c1 "$1")" ] && echo >> "$1"
          ' _ {} \;
          echo "✅ [步骤3] 所有 patch 已规范化"

      - name: 🩹 关键修复：交叉编译 sizeof 测试桩（解决 "can not detect int size" + Exec format error）
        run: |
          cd nginx-android
          
          # 构建脚本会在运行时提取 nginx 源码到 nginx/ 目录，我们提前准备一个正确的 sizeof 脚本（arm64-v8a LP64 模型）
          # 这个 stub 会直接返回正确的大小值，避免在 x86_64 host 上运行 aarch64 二进制
          echo "🔧 注入 cross-compile sizeof 修复脚本..."
          cat > src/nginx_patches/01-cross-compilation-sizeof.patch << 'EOF'
          diff --git a/auto/types/sizeof b/auto/types/sizeof
          index 1234567..89abcde 100755
          --- a/auto/types/sizeof
          +++ b/auto/types/sizeof
          @@ -1,50 +1,28 @@
           #!/bin/sh
          
          -ngx_type=$1
          +ngx_type="$1"
          
          -ngx_test="$CC $CC_TEST_FLAGS $CC_AUX_FLAGS \
          -          -o $NGX_AUTOTEST $NGX_AUTOTEST.c $NGX_LD_OPT $ngx_feature_libs"
          -
          -eval "$ngx_test >> $NGX_AUTOCONF_ERR 2>&1"
          -
          -if [ -x $NGX_AUTOTEST ]; then
          -    ngx_size=`$NGX_AUTOTEST`
          -    echo " $ngx_size bytes"
          -fi
          -
          -case $ngx_size in
          +case "$ngx_type" in
          +  int|unsigned\ int)                 ngx_size=4 ;;
          +  long|unsigned\ long)               ngx_size=8 ;;
          +  "long long"|"unsigned long long")  ngx_size=8 ;;
          +  size_t|off_t|time_t|"void *")      ngx_size=8 ;;
          +  *)                                 ngx_size=8 ;;
          +esac
          +
          +echo " $ngx_size bytes"
          +
          +case $ngx_size in
               4)
                   ngx_max_value=2147483647
                   ngx_max_len='(sizeof("-2147483648") - 1)'
               ;;
          
               8)
                   ngx_max_value=9223372036854775807LL
                   ngx_max_len='(sizeof("-9223372036854775808") - 1)'
               ;;
          
               *)
                   echo
                   echo "$0: error: can not detect $ngx_type size"
                   exit 1
               ;;
           esac
          
          -rm -rf $NGX_AUTOTEST*
          +echo "✅ sizeof 硬编码修复已应用（arm64-v8a）"
          EOF
          echo "✅ 已动态生成正确的 01-cross-compilation-sizeof.patch（专为 NDK r29 设计）"

      - name: 🧪 验证修复效果
        run: |
          cd nginx-android
          echo "=== 修复后补丁目录（01 应已重新生成）==="
          ls -1 src/nginx_patches/ 2>/dev/null | grep -E '01|08' || echo "✅ 01 已重新生成，08 已移除"
          echo -e "\n=== sizeof 补丁预览 ==="
          head -n 30 src/nginx_patches/01-cross-compilation-sizeof.patch | tail -n 15

      - name: 🔨 构建（开启详细日志）
        run: |
          cd nginx-android
          export ANDROID_ABI=arm64-v8a
          export ANDROID_NDK_ROOT=/opt/android-ndk-r29
          export CFLAGS="${CFLAGS} -DNGX_HAVE_SCHED_SETAFFINITY=0"
          set -exo pipefail
          ./scripts/build-android.sh 2>&1 | tee build.log
          echo "✅ 构建完成（日志已保存）"

      - name: 📤 上传产物与日志
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nginx-build-artifacts
          path: |
            nginx-android/build/install/arm64-v8a/
            nginx-android/build.log

      - name: 📋 构建摘要（失败时显示关键错误）
        if: failure()
        run: |
          echo "❌ 构建失败！最后30行关键错误："
          tail -n 30 nginx-android/build.log | grep -A 15 -E "error|failed|Hunk|malformed|sizeof|detect|Exec" || tail -n 25 nginx-android/build.log
