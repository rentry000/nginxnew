name: Build Static PHP (using official example config)

on:
  workflow_dispatch:
    inputs:
      php_version:
        description: 'PHP Version (8.1 \~ 8.5)'
        required: true
        default: '8.4'  # 官方示例用 8.4
  push:
    branches: [ main ]
    paths:
      - 'craft.yml'

jobs:
  build:
    runs-on: ubuntu-24.04-arm  # aarch64 runner

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download prebuilt spc binary (nightly, aarch64)
        run: |
          curl -fsSL -o spc https://dl.static-php.dev/static-php-cli/spc-bin/nightly/spc-linux-aarch64
          chmod +x spc
          ./spc --version

      - name: Install build prerequisites (minimal set for official extensions)
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            binutils bison flex libtool autoconf automake make patch pkg-config \
            libxml2-dev libsqlite3-dev zlib1g-dev libcurl4-openssl-dev libssl-dev \
            libbz2-dev libjpeg-dev libpng-dev libfreetype6-dev libonig-dev libzip-dev \
            libreadline-dev libgmp-dev libicu-dev \
            libsodium-dev libbrotli-dev re2c autopoint gettext

      - name: Create craft.yml using official example
        run: |
          cat > craft.yml << 'EOF'
          # PHP version support: 8.1, 8.2, 8.3, 8.4, 8.5
          php-version: "${{ github.event.inputs.php_version || '8.4' }}"

          # Put your extension list here
          extensions: "apcu,bcmath,calendar,ctype,curl,dba,dom,exif,fileinfo,filter,gd,iconv,mbregex,mbstring,mysqli,mysqlnd,opcache,openssl,pcntl,pdo,pdo_mysql,pdo_sqlite,phar,posix,readline,redis,session,simplexml,sockets,sodium,sqlite3,tokenizer,xml,xmlreader,xmlwriter,xsl,zip,zlib"

          sapi:
            - cli
            - micro
            - fpm

          download-options:
            prefer-pre-built: true
          EOF

      - name: Check environment with spc doctor
        run: |
          ./spc doctor || true

      - name: Safe clean old caches
        run: |
          rm -rf source downloads buildroot || true

      - name: Download sources and libs
        run: |
          ./spc download all --with-php=${{ github.event.inputs.php_version || '8.4' }} --debug

      - name: Build static PHP
        run: |
          ./spc craft --debug

      - name: Prepare artifacts
        run: |
          mkdir -p artifacts
          cp dist/* artifacts/ 2>/dev/null || true
          ls -lh artifacts/ || echo "No files found in dist/"

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: static-php-${{ github.event.inputs.php_version || '8.4' }}-linux-aarch64-official
          path: artifacts/
          retention-days: 7
