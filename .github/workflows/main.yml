name: Build Nginx for Android arm64-v8a (NDK r29 Fixed)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 🌱 Clone nginx-android repository
        run: |
          git clone https://github.com/ryanlee486/nginx-android.git
          cd nginx-android
          # 预先修复所有脚本权限（关键！）
          find . -name "*.sh" -type f -exec chmod +x {} \;
          echo "✅ 已修复所有 shell 脚本执行权限"

      - name: 📦 Download Android NDK r29
        run: |
          wget -q https://dl.google.com/android/repository/android-ndk-r29-linux.zip -O ndk.zip
          unzip -q ndk.zip -d /opt
          echo "ANDROID_NDK_ROOT=/opt/android-ndk-r29" >> $GITHUB_ENV
          echo "✅ NDK r29 已安装到 /opt/android-ndk-r29"

      - name: 🛡️ 智能中和问题补丁（三重保险）
        run: |
          cd nginx-android
          
          # 1️⃣ 全局扫描定位问题补丁
          echo "🔍 扫描所有 .patch 文件..."
          mapfile -t patch_files < <(find . -type f -name "*.patch" 2>/dev/null | grep -v build)
          
          if [ ${#patch_files[@]} -eq 0 ]; then
            echo "⚠️  未发现任何 .patch 文件（可能仓库结构变化）"
          else
            echo "📄 共发现 ${#patch_files[@]} 个补丁文件"
            for pf in "${patch_files[@]}"; do
              if grep -q "cross-compilation-sizeof" "$pf" 2>/dev/null || [[ "$pf" == *"01-cross-compilation-sizeof"* ]]; then
                echo "🎯 中和问题补丁: $pf"
                echo "// NEUTRALIZED: Disabled for NDK r29 compatibility (Clang 18+ handles sizeof correctly)" > "$pf"
                NEUTRALIZED=1
              fi
            done
          fi
          
          # 2️⃣ 保险：清空 patches 目录下所有补丁（防脚本硬编码路径）
          if [ -d "patches" ]; then
            find patches -name "*.patch" -type f -exec sh -c 'echo "// SAFE NEUTRALIZED" > "$1"' _ {} \;
            echo "✅ patches/ 目录下所有补丁已安全中和"
          fi
          
          # 3️⃣ 注入脚本跳过逻辑（动态拦截）
          if [ -f "scripts/build-android.sh" ]; then
            sed -i '/apply_patch.*\.patch/{
              i\
              # SKIP NDK r29 INCOMPATIBLE PATCH\
              if [[ "$patch_file" == *"cross-compilation-sizeof"* ]]; then\
                echo "⏭️  Skipping incompatible patch for NDK r29";\
                continue;\
              fi
            }' scripts/build-android.sh 2>/dev/null && echo "✅ 脚本跳过逻辑注入成功" || echo "⚠️  脚本注入跳过（非关键）"
          fi

      - name: 🔍 验证关键状态
        run: |
          cd nginx-android
          echo "=== 权限验证 ==="
          ls -lh scripts/build-android.sh
          
          echo -e "\n=== 补丁状态验证 ==="
          if find . -name "*cross-compilation-sizeof*.patch" 2>/dev/null | head -1; then
            TARGET=$(find . -name "*cross-compilation-sizeof*.patch" | head -1)
            echo "📄 问题补丁内容:"
            cat "$TARGET"
          else
            echo "✅ 问题补丁已不存在或内容被中和"
          fi
          
          echo -e "\n=== NDK 验证 ==="
          ls -d /opt/android-ndk-r29 2>/dev/null && echo "✅ NDK r29 路径存在"

      - name: 🚀 Build Nginx for arm64-v8a
        run: |
          cd nginx-android
          # 再次确保权限（防中间步骤覆盖）
          chmod +x scripts/build-android.sh
          export ANDROID_NDK_ROOT=/opt/android-ndk-r29
          echo "🔧 开始构建 arm64-v8a (NDK r29)..."
          ./scripts/build-android.sh --arch arm64-v8a
          echo "✅ 构建完成！"

      - name: 📦 Package binary
        run: |
          mkdir -p artifacts
          BINARY="nginx-android/build/nginx-arm64-v8a/nginx"
          if [ -f "$BINARY" ]; then
            cp "$BINARY" artifacts/nginx-arm64
            echo "✅ 二进制文件信息:"
            file artifacts/nginx-arm64
            readelf -h artifacts/nginx-arm64 2>/dev/null | grep -E "Class|Machine"
            cd artifacts && zip -r ../nginx-arm64-magisk.zip .
            echo "📦 压缩包生成成功"
          else
            echo "❌ 错误：未找到构建产物！"
            ls -lhR nginx-android/build/ 2>/dev/null || echo "构建目录为空"
            exit 1
          fi

      - name: 📤 Upload Release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}-r29
          name: Nginx Android arm64-v8a (NDK r29 Fixed)
          files: nginx-arm64-magisk.zip
          draft: false
