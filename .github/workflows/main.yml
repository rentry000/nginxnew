name: Build Nginx for Android arm64-v8a (NDK r29 Final Fix)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 🌱 Clone nginx-android repository
        run: |
          git clone https://github.com/ryanlee486/nginx-android.git
          cd nginx-android
          # 修复脚本权限
          find . -name "*.sh" -type f -exec chmod +x {} \;
          echo "✅ 权限修复完成"

      - name: 📦 Download Android NDK r29
        run: |
          wget -q https://dl.google.com/android/repository/android-ndk-r29-linux.zip -O ndk.zip
          unzip -q ndk.zip -d /opt
          echo "ANDROID_NDK_ROOT=/opt/android-ndk-r29" >> $GITHUB_ENV
          echo "✅ NDK r29 安装完成"

      - name: 🛠️ 强制跳过冲突补丁 (核心修复)
        run: |
          cd nginx-android
          
          # --- 方法 1: 修改脚本逻辑，遇到特定补丁名直接跳过 ---
          echo "🔍 正在修改构建脚本以跳过问题补丁..."
          if [ -f "scripts/build-android.sh" ]; then
            # 在脚本中查找应用补丁的循环
            # 使用 sed 在循环开始处插入跳过逻辑
            sed -i '/for patch_file in .*\.patch/ a \
            # 强制跳过已知与 NDK r29 不兼容的补丁\
            if [[ "$patch_file" == *01-cross-compilation-sizeof* ]]; then\
              echo "⏭️  跳过补丁: $(basename $patch_file) (NDK r29 不兼容)"\
              continue\
            fi\
            ' scripts/build-android.sh
            
            echo "✅ 已注入跳过逻辑"
          else
            echo "❌ 错误：未找到构建脚本 scripts/build-android.sh"
            exit 1
          fi
          
          # --- 方法 2: 保险措施 - 清空问题补丁内容 ---
          # 防止脚本逻辑修改失败，直接把补丁变为空文件
          find . -name "01-cross-compilation-sizeof.patch" -type f -exec sh -c '
            echo "🛡️  清空冲突补丁内容: $1"
            echo "# Neutralized for NDK r29" > "$1"
          ' _ {} \;

      - name: 🔍 验证跳过逻辑是否生效
        run: |
          cd nginx-android
          echo "📄 构建脚本片段预览 (检查是否包含跳过逻辑):"
          grep -A 5 "跳过已知与 NDK r29" scripts/build-android.sh || echo "未找到注入标记 (可能结构不同，但清空补丁已生效)"
          
          echo -e "\n📄 检查问题补丁文件内容:"
          find . -name "01-cross-compilation-sizeof.patch" -exec head -n 2 {} \;

      - name: 🚀 Build Nginx for arm64-v8a
        run: |
          cd nginx-android
          chmod +x scripts/build-android.sh
          export ANDROID_NDK_ROOT=/opt/android-ndk-r29
          echo "🔧 开始构建..."
          ./scripts/build-android.sh --arch arm64-v8a

      - name: 📦 Package binary
        run: |
          mkdir -p artifacts
          BINARY="nginx-android/build/nginx-arm64-v8a/nginx"
          if [ -f "$BINARY" ]; then
            cp "$BINARY" artifacts/nginx-arm64
            file artifacts/nginx-arm64
            cd artifacts && zip -r ../nginx-arm64-magisk.zip .
            echo "✅ 打包成功"
          else
            echo "❌ 构建失败，检查日志"
            ls -lhR nginx-android/build/ 2>/dev/null || echo "构建目录为空"
            exit 1
          fi

      - name: 📤 Upload Release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}-r29
          name: Nginx Android arm64-v8a (Fixed)
          files: nginx-arm64-magisk.zip
          draft: false
