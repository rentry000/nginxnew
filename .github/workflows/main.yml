name: Build Static PHP 8.5.4RC1 (使用你指定的地址)

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'craft.yml'

jobs:
  build:
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download prebuilt spc binary (nightly aarch64)
        run: |
          curl -fsSL -o spc https://dl.static-php.dev/static-php-cli/spc-bin/nightly/spc-linux-aarch64
          chmod +x spc
          ./spc --version

      - name: Install build prerequisites
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            binutils bison flex libtool autoconf automake make patch pkg-config git \
            libxml2-dev libsqlite3-dev zlib1g-dev libcurl4-openssl-dev libssl-dev \
            libbz2-dev libjpeg-dev libpng-dev libfreetype6-dev libonig-dev libzip-dev \
            libreadline-dev libgmp-dev libicu-dev libsodium-dev libbrotli-dev \
            re2c autopoint gettext file

      - name: Create craft.yml (官方示例配置)
        run: |
          cat > craft.yml << 'EOF'
          php-version: "8.5"

          extensions: "apcu,bcmath,calendar,ctype,curl,dba,dom,exif,fileinfo,filter,gd,iconv,mbregex,mbstring,mysqli,mysqlnd,opcache,openssl,pcntl,pdo,pdo_mysql,pdo_sqlite,phar,posix,readline,redis,session,simplexml,sockets,sodium,sqlite3,tokenizer,xml,xmlreader,xmlwriter,xsl,zip,zlib"

          sapi:
            - cli
            - micro
            - fpm

          download-options:
            prefer-pre-built: true
          EOF

      - name: Check environment
        run: |
          ./spc doctor || true

      - name: Safe clean caches
        run: |
          rm -rf downloads buildroot || true

      - name: 下载并诊断你指定的 PHP 8.5.4RC1 地址
        run: |
          mkdir -p downloads source/php-src
          echo "开始下载你指定的链接..."
          curl -L -o downloads/php-8.5.4RC1.tar.gz https://downloads.php.net/\~daniels/php-8.5.4RC1.tar.gz || echo "curl 下载失败"
          
          echo "下载完成，检查文件信息："
          ls -lh downloads/php-8.5.4RC1.tar.gz || echo "文件不存在"
          file downloads/php-8.5.4RC1.tar.gz || echo "file 命令失败"
          
          # 如果文件小，显示前 200 字节内容（可能是 HTML 错误页）
          if [ -f downloads/php-8.5.4RC1.tar.gz ] && [ $(stat -c %s downloads/php-8.5.4RC1.tar.gz) -lt 100000 ]; then
            echo "文件太小，可能是错误页，前 200 字节内容："
            head -c 200 downloads/php-8.5.4RC1.tar.gz | strings || cat downloads/php-8.5.4RC1.tar.gz | head -n 20
          else
            echo "文件大小正常（>100KB），尝试解压..."
            tar -xzf downloads/php-8.5.4RC1.tar.gz -C source/php-src --strip-components=1 || echo "解压失败"
            echo "解压后目录内容："
            ls -lh source/php-src | head -n 5
          fi

      - name: Download 依赖并构建 static PHP
        run: |
          ./spc download all --with-php=8.5 --ignore-cache-sources=php-src --debug || true
          echo "Download 完成，开始构建..."
          ./spc craft --debug

      - name: Prepare artifacts
        run: |
          mkdir -p artifacts
          cp dist/* artifacts/ 2>/dev/null || true
          ls -lh artifacts/ || echo "dist 目录为空或不存在"

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: static-php-8.5.4RC1-linux-aarch64
          path: artifacts/
          retention-days: 7
