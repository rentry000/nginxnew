name: Build Caddy with Plugins (arm64)

on:
  push:
    paths:
      - '.github/workflows/caddy-build.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ["1.20.x"]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Go ${{ matrix.go-version }}
        uses: actions/setup-go@v4
        with:
          go-version: ${{ matrix.go-version }}

      - name: Download xcaddy
        run: |
          wget -q https://github.com/caddyserver/xcaddy/releases/download/v0.4.5/xcaddy_0.4.5_linux_arm64.tar.gz
          tar -xzf xcaddy_0.4.5_linux_arm64.tar.gz
          chmod +x xcaddy
          sudo mv xcaddy /usr/local/bin/

      - name: Build Caddy with Plugins
        run: |
          xcaddy build \
            --with github.com/caddyserver/caddy-waf/v2 \
            --with github.com/caddy-dns/route53@v0.6.0 \
            --with github.com/lucaslorentz/caddy-docker-proxy/v2@v2.11.0 \
            --output caddy-arm64 \
            --target linux/arm64 \
            --with github.com/caddy-contrib/caddy-webdav

      - name: Verify Build
        run: |
          ./caddy-arm64 list-modules | grep -E "waf|webdav|route53"

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: caddy-arm64
          path: caddy-arm64
          retention-days: 30
