name: Build Node.js for Android (arm64)

on:
  workflow_dispatch:

env:
  # 确保此版本在官方 https://nodejs.org/dist/ 中存在
  NODE_VERSION: "25.8.1"
  NDK_VERSION: "r29"
  # 提高到 26 以获得更好的现代 NDK 支持
  API_LEVEL: "26"

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 make python3-pip ninja-build gettext cmake unzip \
            curl wget tar git gcc g++ qemu-user-static

      - name: Download and Setup Android NDK
        run: |
          cd $GITHUB_WORKSPACE
          wget -q https://dl.google.com/android/repository/android-ndk-${NDK_VERSION}-linux.zip -O ndk.zip
          unzip -q ndk.zip
          rm ndk.zip

      - name: Download Node.js Source
        run: |
          cd $GITHUB_WORKSPACE
          # 尝试下载源码，如果 25.8.1 不存在，建议改为当前最新的 23.x
          wget -qO- https://nodejs.org/dist/v${NODE_VERSION}/node-v${NODE_VERSION}.tar.gz | tar xz || echo "Version not found!"

      - name: Configure and Compile Node.js
        run: |
          cd $GITHUB_WORKSPACE/node-v${NODE_VERSION}

          export ANDROID_NDK_HOME=$GITHUB_WORKSPACE/android-ndk-${NDK_VERSION}
          export TOOLCHAIN=$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64
          export PATH=$TOOLCHAIN/bin:$PATH

          # 关键点 1：显式定义所有 GYP 变量，解决 host_os 报错
          export GYP_DEFINES="android_ndk_path=$ANDROID_NDK_HOME OS=android target_arch=arm64 host_os=linux v8_target_arch=arm64"

          # 关键点 2：设置交叉编译器
          export CC=$TOOLCHAIN/bin/aarch64-linux-android${API_LEVEL}-clang
          export CXX=$TOOLCHAIN/bin/aarch64-linux-android${API_LEVEL}-clang++
          export AR=$TOOLCHAIN/bin/llvm-ar
          export NM=$TOOLCHAIN/bin/llvm-nm
          export LD=$TOOLCHAIN/bin/ld.lld
          export RANLIB=$TOOLCHAIN/bin/llvm-ranlib
          
          # 宿主机编译器
          export CC_host=gcc
          export CXX_host=g++

          # 关键点 3：Node.js 22+ 版本建议使用 --with-intl=small-icu 或 none
          # 移除 --without-snapshot，因为新版已不支持禁用它
          ./configure \
            --dest-cpu=arm64 \
            --dest-os=android \
            --cross-compiling \
            --with-intl=none

          # 关键点 4：使用 QEMU 辅助编译（处理 V8 字节码生成）
          # 某些 Node 版本在编译时需要运行二进制，QEMU 会透明处理
          make -j$(nproc)

      - name: Strip and Package
        run: |
          export TOOLCHAIN=$GITHUB_WORKSPACE/android-ndk-${NDK_VERSION}/toolchains/llvm/prebuilt/linux-x86_64
          $TOOLCHAIN/bin/llvm-strip $GITHUB_WORKSPACE/node-v${NODE_VERSION}/out/Release/node
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-android-arm64
          path: node-v${{ env.NODE_VERSION }}/out/Release/node
