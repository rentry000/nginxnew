name: Build Node.js for Android (arm64-v8a)

on:
  workflow_dispatch:
    inputs:
      node_version:
        description: 'Node.js 源码版本 (例如: v20.11.1)'
        required: true
        default: 'v25.8.1'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 检出 Node.js 源码
        uses: actions/checkout@v6
        with:
          repository: nodejs/node
          ref: ${{ github.event.inputs.node_version }}
          fetch-depth: 1

      - name: 配置编译环境
        run: |
          # 1. 设置基础变量
          NDK=$ANDROID_NDK_LATEST_HOME
          TOOLCHAIN=$NDK/toolchains/llvm/prebuilt/linux-x86_64
          TARGET=aarch64-linux-android
          API=24
          
          # 2. 关键修复：先完整展开路径，再写入 GITHUB_ENV（解决 (: not found）
          CC="\( TOOLCHAIN/bin/ \){TARGET}${API}-clang"
          CXX="\( TOOLCHAIN/bin/ \){TARGET}${API}-clang++"
          AR="$TOOLCHAIN/bin/llvm-ar"
          NM="$TOOLCHAIN/bin/llvm-nm"
          AS="\( TOOLCHAIN/bin/ \){TARGET}${API}-clang"
          
          export CC CXX AR NM AS
          
          echo "CC=$CC" >> $GITHUB_ENV
          echo "CXX=$CXX" >> $GITHUB_ENV
          echo "AR=$AR" >> $GITHUB_ENV
          echo "NM=$NM" >> $GITHUB_ENV
          echo "AS=$AS" >> $GITHUB_ENV
          
          echo "CC_host=gcc" >> $GITHUB_ENV
          echo "CXX_host=g++" >> $GITHUB_ENV
          
          # 3. GYP 定义（已包含 openssl_no_asm）
          echo "GYP_DEFINES=target_arch=arm64 v8_target_arch=arm64 android_target_arch=arm64 host_os=linux OS=android android_ndk_path=$NDK openssl_no_asm=1" >> $GITHUB_ENV

      - name: 执行 Configure
        run: |
          ./configure \
            --dest-cpu=arm64 \
            --dest-os=android \
            --cross-compiling \
            --openssl-no-asm \
            --without-intl

      - name: 执行 Make 编译
        run: |
          make -j$(nproc)

      - name: 整理并上传产物
        uses: actions/upload-artifact@v7
        with:
          name: node-android-arm64
          path: out/Release/node
