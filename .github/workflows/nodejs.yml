name: Build Node.js for Android (arm64-v8a)

on:
  workflow_dispatch:
    inputs:
      node_version:
        description: 'Node.js 源码版本 (例如: v20.11.1)'
        required: true
        default: 'v25.8.1'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 检出 Node.js 源码
        uses: actions/checkout@v6
        with:
          repository: nodejs/node
          ref: ${{ github.event.inputs.node_version }}
          fetch-depth: 1

      - name: 配置编译环境
        run: |
          # 1. 基础 NDK 路径设置
          NDK=$ANDROID_NDK_LATEST_HOME
          TOOLCHAIN=$NDK/toolchains/llvm/prebuilt/linux-x86_64
          TARGET=aarch64-linux-android
          API=24
          
          # 2. 核心修复：强制定义 GYP 变量（已增加 openssl_no_asm=1）
          echo "GYP_DEFINES=target_arch=arm64 v8_target_arch=arm64 android_target_arch=arm64 host_os=linux OS=android android_ndk_path=$NDK openssl_no_asm=1" >> $GITHUB_ENV
          
          # 3. 指定工具链路径
          echo "CC=\( TOOLCHAIN/bin/ \){TARGET}${API}-clang" >> $GITHUB_ENV
          echo "CXX=\( TOOLCHAIN/bin/ \){TARGET}${API}-clang++" >> $GITHUB_ENV
          echo "AR=$TOOLCHAIN/bin/llvm-ar" >> $GITHUB_ENV
          echo "NM=$TOOLCHAIN/bin/llvm-nm" >> $GITHUB_ENV
          echo "AS=\( TOOLCHAIN/bin/ \){TARGET}${API}-clang" >> $GITHUB_ENV
          
          # 4. 设置宿主机编译器
          echo "CC_host=gcc" >> $GITHUB_ENV
          echo "CXX_host=g++" >> $GITHUB_ENV

      - name: 执行 Configure
        run: |
          ./configure \
            --dest-cpu=arm64 \
            --dest-os=android \
            --cross-compiling \
            --openssl-no-asm \
            --without-intl

      - name: 执行 Make 编译
        run: |
          # 使用全部核心加速编译
          make -j$(nproc)

      - name: 整理并上传产物
        uses: actions/upload-artifact@v7
        with:
          name: node-android-arm64
          path: out/Release/node
