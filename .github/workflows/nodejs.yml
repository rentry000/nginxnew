name: Build Node.js for Android (arm64-v8a)

on:
  workflow_dispatch:
    inputs:
      node_version:
        description: 'Node.js 源码版本 (例如: v20.11.1)'
        required: true
        default: 'v25.8.1'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 检出 Node.js 源码
        uses: actions/checkout@v6
        with:
          repository: nodejs/node
          ref: ${{ github.event.inputs.node_version }}
          fetch-depth: 1

      - name: 配置环境并编译 Node.js (arm64 Android)
        run: |
          # === 1. 设置 NDK 和工具链（单 step 内直接 export，避免 GITHUB_ENV 问题）===
          NDK=$ANDROID_NDK_LATEST_HOME
          TOOLCHAIN=$NDK/toolchains/llvm/prebuilt/linux-x86_64
          TARGET=aarch64-linux-android
          API=24

          CC="\( TOOLCHAIN/bin/ \){TARGET}${API}-clang"
          CXX="\( TOOLCHAIN/bin/ \){TARGET}${API}-clang++"
          AR="$TOOLCHAIN/bin/llvm-ar"
          NM="$TOOLCHAIN/bin/llvm-nm"
          AS="\( TOOLCHAIN/bin/ \){TARGET}${API}-clang"

          export CC CXX AR NM AS
          export GYP_DEFINES="target_arch=arm64 v8_target_arch=arm64 android_target_arch=arm64 host_os=linux OS=android android_ndk_path=$NDK openssl_no_asm=1"

          # === 调试信息（运行时会打印，便于排查）===
          echo "✅ NDK: $NDK"
          echo "✅ CC : $CC"
          echo "✅ GYP_DEFINES: $GYP_DEFINES"

          # === 2. 执行 Configure ===
          ./configure \
            --dest-cpu=arm64 \
            --dest-os=android \
            --cross-compiling \
            --openssl-no-asm \
            --without-intl

          # === 3. 执行 Make 编译 ===
          make -j$(nproc)

      - name: 整理并上传产物
        uses: actions/upload-artifact@v7
        with:
          name: node-android-arm64
          path: out/Release/node
