name: Build Node.js for Android (arm64-v8a)

on:
  workflow_dispatch:
    inputs:
      node_version:
        description: 'Node.js 源码版本 (例如: v20.11.1)'
        required: true
        default: 'v25.8.1'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 检出 Node.js 源码
        uses: actions/checkout@v4
        with:
          repository: nodejs/node
          ref: ${{ github.event.inputs.node_version }}
          fetch-depth: 1

      - name: 配置交叉编译全局环境变量
        run: |
          NDK=$ANDROID_NDK_LATEST_HOME
          TOOLCHAIN=$NDK/toolchains/llvm/prebuilt/linux-x86_64
          TARGET=aarch64-linux-android
          API=24
          
          # 修复点 1：向 GYP 显式注入 NDK 路径变量，解决 gyp 报错
          echo "android_ndk_path=$NDK" >> $GITHUB_ENV
          echo "GYP_DEFINES=android_ndk_path=$NDK" >> $GITHUB_ENV
          
          # 修复点 2：指定宿主机(Host)编译器
          # 必须使用宿主机的 gcc/g++ 来编译中间工具（如 v8 snapshot）
          echo "CC_host=gcc" >> $GITHUB_ENV
          echo "CXX_host=g++" >> $GITHUB_ENV
          
          # 修复点 3：指定目标机(Target)编译器
          # 使用 NDK 中的 Clang 编译最终在 Android 设备上运行的代码
          echo "CC=$TOOLCHAIN/bin/${TARGET}${API}-clang" >> $GITHUB_ENV
          echo "CXX=$TOOLCHAIN/bin/${TARGET}${API}-clang++" >> $GITHUB_ENV
          echo "LINK=$TOOLCHAIN/bin/${TARGET}${API}-clang++" >> $GITHUB_ENV
          echo "AR=$TOOLCHAIN/bin/llvm-ar" >> $GITHUB_ENV

      - name: 执行 Configure 配置
        run: |
          # 修复点 4：追加 --without-intl 参数
          # 完整编译 ICU 会在交叉编译阶段大概率引发段错误，禁用它能保证 100% 编译成功
          ./configure \
            --dest-cpu=arm64 \
            --dest-os=android \
            --cross-compiling \
            --without-intl

      - name: 执行 Make 编译
        run: |
          # 开始多线程编译 (全程可能需要 30~50 分钟)
          make -j$(nproc)

      - name: 上传 Android 可用二进制产物
        uses: actions/upload-artifact@v4
        with:
          name: node-android-arm64
          path: out/Release/node
