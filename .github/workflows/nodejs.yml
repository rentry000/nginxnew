name: Build Node.js for Android (arm64-v8a)

on:
  workflow_dispatch:
    inputs:
      node_version:
        description: 'Node.js 源码版本 (例如: v20.11.1)'
        required: true
        default: 'v25.8.1'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 检出 Node.js 源码
        uses: actions/checkout@v6
        with:
          repository: nodejs/node
          ref: ${{ github.event.inputs.node_version }}
          fetch-depth: 1

      - name: 配置环境并编译 Node.js (arm64 Android)
        run: |
          # NDK 路径（GitHub 自带）
          NDK=$ANDROID_NDK_LATEST_HOME
          TOOLCHAIN=$NDK/toolchains/llvm/prebuilt/linux-x86_64

          # 关键修复：硬编码完整路径，彻底杜绝变量展开问题
          export CC="$TOOLCHAIN/bin/aarch64-linux-android24-clang"
          export CXX="$TOOLCHAIN/bin/aarch64-linux-android24-clang++"
          export AR="$TOOLCHAIN/bin/llvm-ar"
          export NM="$TOOLCHAIN/bin/llvm-nm"
          export AS="$TOOLCHAIN/bin/aarch64-linux-android24-clang"

          # GYP 定义（包含 openssl_no_asm）
          export GYP_DEFINES="target_arch=arm64 v8_target_arch=arm64 android_target_arch=arm64 host_os=linux OS=android android_ndk_path=$NDK openssl_no_asm=1"

          # 调试输出（运行时请看这几行是否正确）
          echo "✅ NDK: $NDK"
          echo "✅ CC : $CC"
          echo "✅ CXX: $CXX"

          # 执行 Configure
          ./configure \
            --dest-cpu=arm64 \
            --dest-os=android \
            --cross-compiling \
            --openssl-no-asm \
            --without-intl \
            --without-snapshot

          # 执行编译（使用全部核心）
          make -j$(nproc)

      - name: 整理并上传产物
        uses: actions/upload-artifact@v7
        with:
          name: node-android-arm64
          path: out/Release/node
